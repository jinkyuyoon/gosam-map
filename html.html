<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>고삼저수지 보트 GPS</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Leaflet 지도 회전 플러그인 -->
  <script src="https://unpkg.com/leaflet-rotate@0.2.8/dist/leaflet-rotate-src.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #071017;
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      -webkit-user-select: none;
      user-select: none;
    }

    #map {
      width: 100%;
      height: 100dvh;
      background: #071017;
      filter: saturate(.9) contrast(1.03) brightness(.92);
    }

    #map::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 450;
      pointer-events: none;
      background:
        radial-gradient(circle at center, rgba(127,231,231,.08), transparent 34%),
        linear-gradient(180deg, rgba(2,8,12,.10), rgba(2,8,12,.30));
      mix-blend-mode: screen;
    }

    .controls {
      position: absolute;
      top: calc(14px + env(safe-area-inset-top));
      right: 10px;
      z-index: 1001;
      display: flex;
      flex-direction: column;
      gap: 12px;
      pointer-events: none;
    }

    button {
      pointer-events: auto;
      width: 58px;
      height: 58px;
      border: 1px solid rgba(220,255,255,.16);
      border-radius: 18px;
      background:
        radial-gradient(circle at 32% 18%, rgba(255,255,255,.18), rgba(255,255,255,0) 36%),
        linear-gradient(180deg, rgba(255,255,255,.105), rgba(255,255,255,.025)),
        rgba(4,12,17,.34);
      backdrop-filter: blur(24px) saturate(170%);
      -webkit-backdrop-filter: blur(24px) saturate(170%);
      color: rgba(230,255,255,.94);
      font-size: 0;
      line-height: 1;
      text-align: center;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.20),
        inset 0 -1px 0 rgba(0,0,0,.25),
        0 12px 34px rgba(0,0,0,.38);
      padding: 0;
      -webkit-tap-highlight-color: transparent;
      display: grid;
      place-items: center;
    }

    button.dark {
      background:
        radial-gradient(circle at 30% 18%, rgba(255,255,255,.15), rgba(255,255,255,0) 34%),
        linear-gradient(180deg, rgba(255,255,255,.09), rgba(255,255,255,.02)),
        rgba(4,12,17,.30);
    }

    button.active {
      background:
        radial-gradient(circle at 32% 18%, rgba(255,255,255,.72), rgba(255,255,255,0) 35%),
        linear-gradient(180deg, rgba(125,245,245,.86), rgba(35,160,170,.48)),
        rgba(70,235,240,.32);
      border-color: rgba(185,255,255,.74);
      color: #061114;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.62),
        0 0 28px rgba(110,245,245,.38),
        0 16px 38px rgba(0,0,0,.42);
    }

    button svg {
      width: 28px;
      height: 28px;
      display: block;
      stroke: currentColor;
      fill: none;
      stroke-width: 2.4;
      stroke-linecap: round;
      stroke-linejoin: round;
      filter: drop-shadow(0 1px 3px rgba(0,0,0,.45));
    }

    button.active svg {
      filter: drop-shadow(0 0 8px rgba(255,255,255,.55));
    }

    .boat-wrap {
      width: 64px;
      height: 64px;
      transform-origin: 50% 50%;
      will-change: transform;
    }

    .leaflet-control-attribution {
      display: none;
    }

    .leaflet-control-container .leaflet-top.leaflet-left {
      display: none;
    }

    .ring-label {
      color: rgba(238,255,255,.68);
      font-size: 10.5px;
      font-weight: 700;
      letter-spacing: .25px;
      background: transparent;
      border: none;
      box-shadow: none;
      text-shadow:
        0 1px 3px rgba(0,0,0,.9),
        0 0 10px rgba(127,231,231,.22);
      white-space: nowrap;
    }

    .pin-delete-btn {
      width: auto;
      height: auto;
      line-height: 1;
      border-radius: 10px;
      padding: 8px 10px;
      font-size: 13px;
    }

    #scaleBar {
      position: absolute;
      right: 14px;
      bottom: calc(16px + env(safe-area-inset-bottom));
      z-index: 1000;
      min-width: 150px;
      padding: 12px 16px 11px;
      border: 1px solid rgba(220,255,255,.14);
      border-radius: 18px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.025)),
        rgba(4,12,17,.34);
      backdrop-filter: blur(24px) saturate(170%);
      -webkit-backdrop-filter: blur(24px) saturate(170%);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.18),
        0 12px 34px rgba(0,0,0,.38);
      color: rgba(238,255,255,.92);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: .2px;
      display: flex;
      align-items: center;
      gap: 12px;
      pointer-events: none;
    }

    #scaleLine {
      width: 88px;
      height: 16px;
      position: relative;
      border-bottom: 2px solid rgba(238,255,255,.86);
      background: repeating-linear-gradient(
        90deg,
        transparent 0,
        transparent 17px,
        rgba(238,255,255,.86) 17px,
        rgba(238,255,255,.86) 19px
      );
    }

    #scaleLine::before,
    #scaleLine::after {
      content: "";
      position: absolute;
      bottom: -2px;
      width: 2px;
      height: 9px;
      background: rgba(238,255,255,.86);
    }

    #scaleLine::before { left: 0; }
    #scaleLine::after { right: 0; }

    @media (max-width: 390px) {
      .controls { right: 8px; gap: 10px; }
      button { width: 50px; height: 50px; border-radius: 16px; }
      button svg { width: 25px; height: 25px; }
      .boat-wrap { width: 58px; height: 58px; }
      #scaleBar { right: 10px; bottom: calc(12px + env(safe-area-inset-bottom)); min-width: 130px; }
      #scaleLine { width: 72px; }
    }
  </style>
</head>

<body>
<div id="map"></div>


<div class="controls">
  <button id="locBtn" onclick="goToMe()" aria-label="내 위치" title="내 위치">
    <svg viewBox="0 0 32 32"><path d="M16 3v5M16 24v5M3 16h5M24 16h5"/><circle cx="16" cy="16" r="7"/><circle cx="16" cy="16" r="2.2" fill="currentColor" stroke="none"/></svg>
  </button>
  <button id="compassBtn" onclick="enableCompass()" aria-label="나침반" title="나침반">
    <svg viewBox="0 0 32 32"><path d="M16 4l9 12-9 12-9-12z"/><path d="M16 9l4.5 7L16 23l-4.5-7z" fill="currentColor" stroke="none"/></svg>
  </button>
  <button id="headingBtn" class="dark" onclick="toggleHeadingUp()" aria-label="헤딩업" title="헤딩업">
    <svg viewBox="0 0 32 32"><path d="M16 4l11 24-11-6-11 6z" fill="currentColor" stroke="none"/></svg>
  </button>
  <button id="followBtn" class="dark" onclick="toggleFollow()" aria-label="추적" title="추적">
    <svg viewBox="0 0 32 32"><circle cx="16" cy="16" r="10"/><circle cx="16" cy="16" r="3.5" fill="currentColor" stroke="none"/></svg>
  </button>
  <button id="pinBtn" onclick="addPinHere()" title="핀 추가">
    <svg viewBox="0 0 32 32"><path d="M16 6v20M6 16h20"/></svg>
  </button>
</div>

<div id="scaleBar">
  <div id="scaleLine"></div>
  <div>20 m</div>
</div>

<script>
/* =========================================================
   설정
========================================================= */
const IMAGE_URL = "gosam-low-water-optimized.jpg";

const INITIAL_CENTER = [37.082, 127.283];
const INITIAL_ZOOM = 18;

// Leaflet bounds: [[south, west], [north, east]]
const IMAGE_BOUNDS = [
  [37.07270, 127.269358],
  [37.09483, 127.297100]
];

const RING_METERS = [5,10,20,30,40,50];
const HEADING_LINE_METERS = 50;

const MAX_GPS_ACCURACY_DROP = 80;
const WEAK_GPS_ACCURACY = 25;
const MIN_MOVE_METERS = 1.0;

const POS_SMOOTH_GOOD = 0.45;
const POS_SMOOTH_WEAK = 0.25;
const COMPASS_SMOOTH = 0.04;
const GPS_HEAD_SMOOTH = 0.16;

// Leaflet rotate 방향이 반대로 느껴지면 -1로 바꾸면 됨
const HEADING_BEARING_SIGN = 1;
const HEADING_OFFSET = 0;

// 회전 안정화
const BEARING_UPDATE_MS = 120;
const BEARING_MIN_DIFF = 5;

/* =========================================================
   지도 생성
========================================================= */
const map = L.map("map", {
  center: INITIAL_CENTER,
  zoom: INITIAL_ZOOM,
  zoomControl: false,
  attributionControl: false,
  rotate: true,
  touchRotate: false,
  bearing: 0,
  inertia: true,
  preferCanvas: true
});

L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", {
  maxZoom: 19,
  crossOrigin: true
}).addTo(map);

L.imageOverlay(IMAGE_URL, IMAGE_BOUNDS, {
  opacity: 0.92,
  interactive: false
}).addTo(map);

/* =========================================================
   상태
========================================================= */
const compassBtn = document.getElementById("compassBtn");
const headingBtn = document.getElementById("headingBtn");
const followBtn = document.getElementById("followBtn");

let headingUp = false;
let followBoat = false; // starts disabled
let compassEnabled = false;

let currentLatLng = null;
let smoothedLatLng = null;

let pinMode = false;

let compassHeading = null;
let gpsHeading = null;
let finalHeading = 0;

let boatMarker = null;
let boatWrapEl = null;
let lastGpsAt = 0;
let lastCenterUpdateAt = 0;
let lastBearingUpdateAt = 0;
let lastBearingApplied = 0;

let userInteractingUntil = 0;

/* =========================================================
   사용자 조작 감지
========================================================= */
function markUserInteracting() {
  userInteractingUntil = Date.now() + 700;
}

["dragstart", "zoomstart", "movestart"].forEach(ev => {
  map.on(ev, () => {
    if (!map._programmaticMove) {
      markUserInteracting();

      followBoat = false;
      headingUp = false;

      if (typeof map.setBearing === "function") {
        map.setBearing(0);
      }

      updateButtons();
    }
  });
});

function isUserInteracting() {
  return Date.now() < userInteractingUntil;
}

function programmatic(fn, duration = 300) {
  map._programmaticMove = true;
  fn();
  setTimeout(() => { map._programmaticMove = false; }, duration);
}

  map.on("click", function(e) {

  if (!pinMode) return;

  pinMode = false;

  if (!confirm("여기에 핀을 추가하시겠습니까?")) {
    return;
  }

  const pins = JSON.parse(localStorage.getItem("gosamPins") || "[]");

  pins.push({
    lat: e.latlng.lat,
    lng: e.latlng.lng,
    name: "Point " + (pins.length + 1),
    createdAt: Date.now()
  });

  localStorage.setItem(
    "gosamPins",
    JSON.stringify(pins)
  );

  loadPins();

});
/* =========================================================
   유틸
========================================================= */
function normalizeDeg(d) {
  d = d % 360;
  return d < 0 ? d + 360 : d;
}

function angleDiff(from, to) {
  return ((to - from + 540) % 360) - 180;
}

function smoothAngle(prev, next, factor) {
  if (prev === null || prev === undefined || isNaN(prev)) return normalizeDeg(next);
  return normalizeDeg(prev + angleDiff(prev, next) * factor);
}

function smoothLatLng(prev, next, factor) {
  if (!prev) return next;
  return L.latLng(
    prev.lat + (next.lat - prev.lat) * factor,
    prev.lng + (next.lng - prev.lng) * factor
  );
}

function formatSpeed(s) {
  if (s === null || s === undefined || isNaN(s)) return "-";
  return (s * 3.6).toFixed(1) + "km/h";
}

function formatHeading(h) {
  if (h === null || h === undefined || isNaN(h)) return "-";
  return Math.round(normalizeDeg(h)) + "°";
}

function destinationPoint(center, meters, bearingDeg) {
  const R = 6371000;
  const brng = bearingDeg * Math.PI / 180;
  const lat1 = center.lat * Math.PI / 180;
  const lng1 = center.lng * Math.PI / 180;

  const lat2 = Math.asin(
    Math.sin(lat1) * Math.cos(meters / R) +
    Math.cos(lat1) * Math.sin(meters / R) * Math.cos(brng)
  );

  const lng2 = lng1 + Math.atan2(
    Math.sin(brng) * Math.sin(meters / R) * Math.cos(lat1),
    Math.cos(meters / R) - Math.sin(lat1) * Math.sin(lat2)
  );

  return L.latLng(lat2 * 180 / Math.PI, lng2 * 180 / Math.PI);
}

function updateButtons() {
  compassBtn.classList.toggle("active", compassEnabled);
  headingBtn.classList.toggle("active", headingUp);
  followBtn.classList.toggle("active", followBoat);
}

/* =========================================================
   보트 아이콘
========================================================= */
function boatSvg(size = 64) {
  return `
  <svg width="${size}" height="${size}" viewBox="0 0 84 84">
    <defs>
      <linearGradient id="hullGrad${size}" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#FFFFFF"/>
        <stop offset="42%" stop-color="#BFFFFF"/>
        <stop offset="100%" stop-color="#21DDE4"/>
      </linearGradient>
      <linearGradient id="deckGrad${size}" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="rgba(255,255,255,.92)"/>
        <stop offset="100%" stop-color="rgba(255,255,255,.30)"/>
      </linearGradient>
      <filter id="boatGlow${size}" x="-45%" y="-45%" width="190%" height="190%">
        <feDropShadow dx="0" dy="0" stdDeviation="2.4" flood-color="#66F7FF" flood-opacity=".72"/>
        <feDropShadow dx="0" dy="7" stdDeviation="4.2" flood-color="#000000" flood-opacity=".48"/>
      </filter>
    </defs>

    <g filter="url(#boatGlow${size})">
      <path d="M42 5
               C55 19 66 41 60 68
               C56 76 28 76 24 68
               C18 41 29 19 42 5 Z"
            fill="url(#hullGrad${size})"
            stroke="rgba(255,255,255,.96)"
            stroke-width="3.4"
            stroke-linejoin="round"/>

      <path d="M42 14
               C49 28 53 45 49 64
               C46 69 38 69 35 64
               C31 45 35 28 42 14 Z"
            fill="rgba(4,24,30,.42)"/>

      <path d="M42 7 L55 30 L42 24 L29 30 Z"
            fill="#FFFFFF"
            opacity=".98"/>

      <path d="M30 60 C35 65 49 65 54 60"
            fill="none"
            stroke="rgba(255,255,255,.70)"
            stroke-width="2.2"
            stroke-linecap="round"/>

      <path d="M25 68 C31 75 53 75 59 68"
            fill="none"
            stroke="rgba(4,24,30,.22)"
            stroke-width="2"/>
    </g>
  </svg>`;
}

function createBoatIcon(rotation) {
  return L.divIcon({
    className: "",
    html: `<div id="boatWrap" class="boat-wrap" style="transform: rotate(${rotation}deg);">${boatSvg(64)}</div>`,
    iconSize: [64, 64],
    iconAnchor: [32, 32]
  });
}

function getBoatRotation() {
  // 헤딩업 ON: 지도 자체가 회전하므로 보트는 화면 위쪽 고정
  // 헤딩업 OFF: 보트 아이콘이 나침반/방향값을 따라 회전
  return headingUp ? 0 : finalHeading;
}

function updateBoatRotationOnly() {
  if (!boatWrapEl) {
    boatWrapEl = document.getElementById("boatWrap");
  }
  if (!boatWrapEl) return;

  boatWrapEl.style.transform = `rotate(${normalizeDeg(getBoatRotation())}deg)`;
}

function updateBoat(pos) {
  if (!boatMarker) {
    boatMarker = L.marker(pos, {
      icon: createBoatIcon(getBoatRotation()),
      interactive: false
    }).addTo(map);

    boatWrapEl = document.getElementById("boatWrap");
  } else {
    boatMarker.setLatLng(pos);
  }

  // 중요: GPS 이벤트에서는 위치만 갱신하고, 아이콘 재생성은 하지 않는다.
  // 회전은 나침반 이벤트에서 CSS transform으로 즉시 갱신한다.
  updateBoatRotationOnly();
}

/* =========================================================
   거리 링 / 진행선
========================================================= */
const ringLayer = L.layerGroup().addTo(map);
const labelLayer = L.layerGroup().addTo(map);
let headingLine = null;
let headingLabel = null;
let accuracyCircle = null;
let headingCone = null;
let trailLine = null;
let trailPoints = [];

let pinLayer = L.layerGroup().addTo(map);  
  
const ringCircles = {};
const ringLabels = {};
  
function createRangeRings() {
  RING_METERS.forEach(r => {
    const circle = L.circle(INITIAL_CENTER, {
      radius: r,
      color: "#EFFFFF",
      weight: 0.75,
      opacity:
        r >= 50 ? 0.50 :
        r >= 40 ? 0.43 :
        r >= 30 ? 0.36 :
        r >= 20 ? 0.30 :
        r >= 10 ? 0.24 :
        0.18,
      fillOpacity: 0,
      dashArray: "1,4",
      lineCap: "round",
      interactive: false
    }).addTo(ringLayer);

    ringCircles[r] = circle;

    if (r !== 5) {
      const label = L.marker(INITIAL_CENTER, {
        icon: L.divIcon({
          className: "ring-label",
          html: `${r}m`,
          iconSize: [30, 14],
          iconAnchor: [15, 7]
        }),
        interactive: false
      }).addTo(labelLayer);

      ringLabels[r] = label;
    }
  });
}

function updateRangeRings(center) {
  RING_METERS.forEach(r => {
    ringCircles[r].setLatLng(center);

    if (ringLabels[r]) {
      ringLabels[r].setLatLng(
        destinationPoint(center, r, headingUp ? finalHeading : 0)
      );
    }
  });
}

function createHeadingLine() {
  // 북쪽 표시선 제거
}

function updateHeadingLine(center) {
  // 북쪽 표시선 제거
}



function createHeadingCone() {
  headingCone = L.polygon([], {
    color: "rgba(255,255,255,.34)",
    weight: 1,
    opacity: 0.55,
    fillColor: "#FFFFFF",
    fillOpacity: 0.060,
    interactive: false
  }).addTo(map);
}

function updateHeadingCone(center) {
  if (!headingCone) return;

  const left = destinationPoint(center, 38, finalHeading - 14);
  const tip = destinationPoint(center, 48, finalHeading);
  const right = destinationPoint(center, 38, finalHeading + 14);

  headingCone.setLatLngs([[center, left, tip, right]]);
}

function createTrailLine() {
  trailLine = L.polyline([], {
    color: "rgba(255,255,255,.46)",
    weight: 1.25,
    opacity: 0.62,
    dashArray: "1,9",
    lineCap: "round",
    interactive: false
  }).addTo(map);
}

function updateTrail(pos) {
  if (!trailLine || !pos) return;

  const last = trailPoints[trailPoints.length - 1];
  if (!last || last.distanceTo(pos) > 1.8) {
    trailPoints.push(pos);
  }

  if (trailPoints.length > 28) {
    trailPoints.shift();
  }

  trailLine.setLatLngs(trailPoints);
}


function ensureAccuracyCircle(center, accuracy){
  const a = Math.max(1, accuracy || 1);

  // 정확도 5m 이하면 숨김
  if (a <= 3) {
    if (accuracyCircle) {
      map.removeLayer(accuracyCircle);
      accuracyCircle = null;
    }
    return;
  }

  let color = "rgba(255,255,255,.70)";

  if (!accuracyCircle) {
    accuracyCircle = L.circle(center, {
      radius: a,
      color: color,
      fillColor: color,
      fillOpacity: 0.035,
      weight: 0.9,
      dashArray: "1,4",
      interactive: false
    }).addTo(map);
  } else {
    accuracyCircle.setLatLng(center);
    accuracyCircle.setRadius(a);
    accuracyCircle.setStyle({
      color: color,
      fillColor: color
    });
  }
}


/* =========================================================
   헤딩 / 회전
========================================================= */
function mapBearingForHeading() {
    return normalizeDeg(360 - finalHeading);
}

function applyHeadingBearingIfNeeded() {
  if (!headingUp || isUserInteracting()) return;
  if (typeof map.setBearing !== "function") return;

  const now = Date.now();
  if (now - lastBearingUpdateAt < BEARING_UPDATE_MS) return;

  const target = mapBearingForHeading();
  const diff = Math.abs(angleDiff(lastBearingApplied, target));

  if (diff < BEARING_MIN_DIFF) return;

  lastBearingUpdateAt = now;
  lastBearingApplied = target;

  map.setBearing(target);
}

function chooseHeading(speed) {
  if (compassHeading !== null && !isNaN(compassHeading)) {
    finalHeading = smoothAngle(finalHeading, compassHeading, COMPASS_SMOOTH);
    return "나침반";
  }

  if (gpsHeading !== null && !isNaN(gpsHeading)) {
    finalHeading = smoothAngle(finalHeading, gpsHeading, GPS_HEAD_SMOOTH);
    return "GPS";
  }

  return "대기";
}

/* =========================================================
   전체 업데이트
========================================================= */
function updateAll(pos, accuracy, speed, source) {
  if (!pos) return;

  updateBoat(pos);
  updateRangeRings(pos);
  updateHeadingCone(pos);
  updateTrail(pos);
  ensureAccuracyCircle(pos, accuracy);
  applyHeadingBearingIfNeeded();

  if (followBoat && !isUserInteracting()) {
    const now = Date.now();
    if (now - lastCenterUpdateAt > 350) {
      lastCenterUpdateAt = now;
      programmatic(() => {
        map.panTo(pos, { animate: true, duration: 0.25 });
      }, 300);
    }
  }
}

/* =========================================================
   나침반
========================================================= */
window.enableCompass = async function() {
  try {
    if (
      typeof DeviceOrientationEvent !== "undefined" &&
      typeof DeviceOrientationEvent.requestPermission === "function"
    ) {
      const result = await DeviceOrientationEvent.requestPermission();
      if (result !== "granted") {
        alert("나침반 권한이 거부되었습니다.");
        return;
      }
    }

    window.addEventListener("deviceorientationabsolute", onOrientation, true);
    window.addEventListener("deviceorientation", onOrientation, true);

    compassEnabled = true;
    updateButtons();
  } catch (e) {
    alert("나침반 권한 요청 실패: " + e.message);
  }
};

function onOrientation(e) {
  let h = null;

  if (e.webkitCompassHeading !== undefined && e.webkitCompassHeading !== null) {
    h = e.webkitCompassHeading;
  } else if (e.alpha !== null && e.alpha !== undefined) {
    h = 360 - e.alpha;
  }

  if (h === null || isNaN(h)) return;

  compassHeading = smoothAngle(compassHeading, normalizeDeg(h), COMPASS_SMOOTH);
  const source = chooseHeading(0);

  // 나침반 이벤트에서는 위치/거리링은 건드리지 않고,
  // 보트 아이콘 회전과 지도 헤딩만 즉시 갱신한다.
  updateBoatRotationOnly();
  applyHeadingBearingIfNeeded();
}

/* =========================================================
   GPS
========================================================= */
function startGPS() {
  if (!navigator.geolocation) {
    alert("GPS를 지원하지 않는 브라우저입니다.");
    return;
  }

  navigator.geolocation.watchPosition(
    pos => {
      const now = Date.now();
      if (now - lastGpsAt < 700) return;
      lastGpsAt = now;

      const lat = pos.coords.latitude;
      const lng = pos.coords.longitude;
      const accuracy = pos.coords.accuracy;
      const speed = pos.coords.speed;
      const heading = pos.coords.heading;

      if (accuracy && accuracy > MAX_GPS_ACCURACY_DROP) {
        return;
      }

      const raw = L.latLng(lat, lng);
      currentLatLng = raw;

      if (heading !== null && heading !== undefined && !isNaN(heading)) {
        gpsHeading = normalizeDeg(heading);
      }

      if (smoothedLatLng && smoothedLatLng.distanceTo(raw) < MIN_MOVE_METERS) {
        const source = chooseHeading(speed);
        updateAll(smoothedLatLng, accuracy, speed, source);
        return;
      }

      const factor = accuracy && accuracy > WEAK_GPS_ACCURACY
        ? POS_SMOOTH_WEAK
        : POS_SMOOTH_GOOD;

      smoothedLatLng = smoothLatLng(smoothedLatLng, raw, factor);

      const source = chooseHeading(speed);
      updateAll(smoothedLatLng, accuracy, speed, source);
    },
    err => {
      alert("GPS 오류. HTTPS 주소와 Safari 위치 권한을 확인하세요.");
    },
    {
      enableHighAccuracy: true,
      maximumAge: 30000,
      timeout: 15000
    }
  );
}

function addPinHere() {

  pinMode = true;

  alert("지도에서 원하는 위치를 터치하세요.");

}

function loadPins() {

  pinLayer.clearLayers();

  const pins = JSON.parse(localStorage.getItem("gosamPins") || "[]");

  pins.forEach((p, index) => {

    const marker = L.marker([p.lat, p.lng]).addTo(pinLayer);

    marker.bindPopup(`
      <b>${p.name}</b><br><br>
      <button class="pin-delete-btn" onclick="deletePin(${index})">
        🗑️ 삭제
      </button>
    `);

  });

}

window.deletePin = function(index) {

  const pins = JSON.parse(localStorage.getItem("gosamPins") || "[]");

  if (!confirm("핀을 삭제하시겠습니까?")) return;

  pins.splice(index, 1);

  localStorage.setItem(
    "gosamPins",
    JSON.stringify(pins)
  );

  loadPins();
};
/* =========================================================
   버튼
========================================================= */
window.goToMe = function() {
  if (!navigator.geolocation) {
    alert("위치 서비스를 지원하지 않습니다.");
    return;
  }

  navigator.geolocation.getCurrentPosition(
    pos => {
      const now = L.latLng(pos.coords.latitude, pos.coords.longitude);

      currentLatLng = now;
      smoothedLatLng = now;
      followBoat = true;

      if (pos.coords.heading !== null && pos.coords.heading !== undefined && !isNaN(pos.coords.heading)) {
        gpsHeading = normalizeDeg(pos.coords.heading);
      }

      const source = chooseHeading(pos.coords.speed);

      programmatic(() => {
        map.setView(now, Math.max(map.getZoom(), 19), { animate: true });
      }, 500);

      updateAll(now, pos.coords.accuracy, pos.coords.speed, source);
      updateButtons();
    },
    () => alert("현재 위치를 가져오지 못했습니다. 위치 권한을 확인하세요."),
    {
      enableHighAccuracy: true,
      timeout: 12000,
      maximumAge: 30000
    }
  );
};

window.toggleHeadingUp = function() {
  headingUp = !headingUp;
  if (headingUp) {
  followBoat = true;
    }
  if (!headingUp) {
    if (typeof map.setBearing === "function") {
      map.setBearing(0);
      lastBearingApplied = 0;
    }
  } else {
    if (!compassEnabled) {
      enableCompass();
    }
    applyHeadingBearingIfNeeded();
  }

  updateBoatRotationOnly();
  if (smoothedLatLng) updateAll(smoothedLatLng, null, 0, chooseHeading(0));
  updateButtons();
};

window.toggleFollow = function() {
  followBoat = !followBoat;

  if (followBoat && smoothedLatLng) {
    programmatic(() => {
      map.setView(smoothedLatLng, Math.max(map.getZoom(), 17), { animate: true });
    }, 400);
  }

  updateButtons();
};

/* =========================================================
   시작
========================================================= */
createRangeRings();
createHeadingLine();
createHeadingCone();
createTrailLine();

// ✅ 저장된 핀 불러오기
loadPins();

startGPS();
updateButtons();
</script>
