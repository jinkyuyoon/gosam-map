<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>고삼저수지 보트 GPS</title>

  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #111;
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      -webkit-user-select: none;
      user-select: none;
    }

    #map {
      width: 100%;
      height: 100dvh;
      background: #111;
    }

    #info {
      position: absolute;
      top: calc(8px + env(safe-area-inset-top));
      left: 8px;
      right: 64px;
      z-index: 20;
      background: rgba(255,255,255,0.88);
      color: #111;
      padding: 6px 8px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.18);
      font-size: 10.5px;
      line-height: 1.25;
      pointer-events: none;
      box-sizing: border-box;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }

    .controls {
      position: absolute;
      top: calc(76px + env(safe-area-inset-top));
      right: 8px;
      z-index: 30;
      display: flex;
      flex-direction: column;
      gap: 8px;
      pointer-events: none;
    }

    button {
      pointer-events: auto;
      width: 46px;
      height: 46px;
      border: 0;
      border-radius: 50%;
      background: rgba(0,122,255,0.94);
      color: #fff;
      font-size: 19px;
      font-weight: 800;
      line-height: 46px;
      text-align: center;
      box-shadow: 0 3px 10px rgba(0,0,0,0.34);
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    button.dark { background: rgba(25,25,25,0.92); }
    button.active { background: rgba(255,149,0,0.98); color: #111; }

    .boat {
      width: 52px;
      height: 52px;
      transform-origin: 50% 50%;
      will-change: transform;
    }

    /* 헤딩업 ON에서 쓰는 화면 고정 보트 */
    #fixedBoat {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 56px;
      height: 56px;
      margin-left: -28px;
      margin-top: -28px;
      z-index: 25;
      pointer-events: none;
      display: none;
      filter: drop-shadow(0 3px 5px rgba(0,0,0,0.45));
    }

    .maplibregl-ctrl-bottom-left,
    .maplibregl-ctrl-bottom-right { display: none; }

    @media (max-width: 390px) {
      #info { right: 58px; font-size: 10px; }
      .controls { right: 7px; gap: 7px; }
      button { width: 42px; height: 42px; font-size: 18px; line-height: 42px; }
      .boat { width: 48px; height: 48px; }
    }
  </style>
</head>

<body>
<div id="map"></div>

<div id="info">GPS 준비 중...</div>

<div id="fixedBoat"></div>

<div class="controls">
  <button id="locBtn" onclick="goToMe()" aria-label="내 위치" title="내 위치">📍</button>
  <button id="compassBtn" onclick="enableCompass()" aria-label="나침반" title="나침반">🧭</button>
  <button id="headingBtn" class="dark" onclick="toggleHeadingUp()" aria-label="헤딩업" title="헤딩업">⬆️</button>
  <button id="followBtn" class="dark" onclick="toggleFollow()" aria-label="추적" title="추적">🎯</button>
</div>

<script>
/* =========================================================
   설정
========================================================= */
const IMAGE_URL = "gosam-low-water-optimized.jpg";

const IMAGE_COORDINATES = [
  [127.269358, 37.09483],
  [127.297100, 37.09483],
  [127.297100, 37.07270],
  [127.269358, 37.07270]
];

const INITIAL_CENTER = [127.283, 37.082];
const INITIAL_ZOOM = 14.8;

const RING_METERS = [5,10,20,30,40,50];
const HEADING_LINE_METERS = 50;

const MAX_GPS_ACCURACY_DROP = 80;
const WEAK_GPS_ACCURACY = 25;
const MIN_MOVE_METERS = 3.0;

const POS_SMOOTH_GOOD = 0.18;
const POS_SMOOTH_WEAK = 0.08;
const COMPASS_SMOOTH = 0.18;
const GPS_HEAD_SMOOTH = 0.16;

/*
  핵심:
  MapLibre bearing을 계속 돌리는 대신, 최종 화면 레이어를 CSS로 회전시킨다.
  iPhone Safari에서 훨씬 가볍다.
  방향이 반대로 보이면 -1로 변경.
*/
const VISUAL_ROTATE_SIGN = -1;
const CSS_ROTATE_LERP = 0.16;
const CSS_ROTATE_MIN_DIFF = 0.25;

/* =========================================================
   지도
========================================================= */
const map = new maplibregl.Map({
  container: "map",
  center: INITIAL_CENTER,
  zoom: INITIAL_ZOOM,
  bearing: 0,
  pitch: 0,
  dragRotate: false,
  touchZoomRotate: false,
  attributionControl: false,
  style: {
    version: 8,
    sources: {
      osm: {
        type: "raster",
        tiles: ["https://tile.openstreetmap.org/{z}/{x}/{y}.png"],
        tileSize: 256,
        attribution: "© OpenStreetMap"
      }
    },
    layers: [{ id: "osm", type: "raster", source: "osm" }]
  }
});

/* =========================================================
   상태
========================================================= */
const info = document.getElementById("info");
const compassBtn = document.getElementById("compassBtn");
const headingBtn = document.getElementById("headingBtn");
const followBtn = document.getElementById("followBtn");
const fixedBoat = document.getElementById("fixedBoat");

let headingUp = false;
let followBoat = false;
let compassEnabled = false;

let currentLngLat = null;
let smoothedLngLat = null;

let compassHeading = null;
let gpsHeading = null;
let finalHeading = 0;

let boatMarker = null;
let lastGpsAt = 0;
let lastCenterUpdateAt = 0;

let visualRotationCurrent = 0;
let visualRotationTarget = 0;
let mapCanvasContainer = null;

/* =========================================================
   지도 로드
========================================================= */
map.on("load", () => {
  map.addSource("low-water", {
    type: "image",
    url: IMAGE_URL,
    coordinates: IMAGE_COORDINATES
  });

  map.addLayer({
    id: "low-water-layer",
    type: "raster",
    source: "low-water",
    paint: { "raster-opacity": 0.92, "raster-fade-duration": 0 }
  });

  createRangeRings();
  createHeadingLine();
  createFixedBoat();
  cacheCanvasContainer();
  startVisualRotationLoop();
  startGPS();
  updateButtons();
});

/* =========================================================
   유틸
========================================================= */
function normalizeDeg(d) {
  d = d % 360;
  return d < 0 ? d + 360 : d;
}

function angleDiff(from, to) {
  return ((to - from + 540) % 360) - 180;
}

function smoothAngle(prev, next, factor) {
  if (prev === null || prev === undefined || isNaN(prev)) return normalizeDeg(next);
  return normalizeDeg(prev + angleDiff(prev, next) * factor);
}

function smoothPosition(prev, next, factor) {
  if (!prev) return next;
  return [
    prev[0] + (next[0] - prev[0]) * factor,
    prev[1] + (next[1] - prev[1]) * factor
  ];
}

function distanceMeters(a, b) {
  if (!a || !b) return Infinity;
  const R = 6371000;
  const lat1 = a[1] * Math.PI / 180;
  const lat2 = b[1] * Math.PI / 180;
  const dLat = (b[1] - a[1]) * Math.PI / 180;
  const dLng = (b[0] - a[0]) * Math.PI / 180;
  const x = Math.sin(dLat/2)**2 + Math.cos(lat1)*Math.cos(lat2)*Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(x), Math.sqrt(1 - x));
}

function destinationPoint(center, meters, bearingDeg) {
  const R = 6371000;
  const brng = bearingDeg * Math.PI / 180;
  const lat1 = center[1] * Math.PI / 180;
  const lng1 = center[0] * Math.PI / 180;

  const lat2 = Math.asin(
    Math.sin(lat1) * Math.cos(meters / R) +
    Math.cos(lat1) * Math.sin(meters / R) * Math.cos(brng)
  );

  const lng2 = lng1 + Math.atan2(
    Math.sin(brng) * Math.sin(meters / R) * Math.cos(lat1),
    Math.cos(meters / R) - Math.sin(lat1) * Math.sin(lat2)
  );

  return [lng2 * 180 / Math.PI, lat2 * 180 / Math.PI];
}

function formatSpeed(s) {
  if (s === null || s === undefined || isNaN(s)) return "-";
  return (s * 3.6).toFixed(1) + "km/h";
}

function formatHeading(h) {
  if (h === null || h === undefined || isNaN(h)) return "-";
  return Math.round(normalizeDeg(h)) + "°";
}

function updateButtons() {
  compassBtn.classList.toggle("active", compassEnabled);
  headingBtn.classList.toggle("active", headingUp);
  followBtn.classList.toggle("active", followBoat);
}

/* =========================================================
   CSS 기반 헤딩업 회전
========================================================= */
function cacheCanvasContainer() {
  mapCanvasContainer = document.querySelector(".maplibregl-canvas-container");
  if (mapCanvasContainer) {
    mapCanvasContainer.style.transformOrigin = "50% 50%";
    mapCanvasContainer.style.willChange = "transform";
  }
}

function updateVisualRotationTarget() {
  visualRotationTarget = headingUp ? normalizeDeg(finalHeading * VISUAL_ROTATE_SIGN) : 0;
}

function startVisualRotationLoop() {
  requestAnimationFrame(visualRotationLoop);
}

function visualRotationLoop() {
  requestAnimationFrame(visualRotationLoop);

  if (!mapCanvasContainer) cacheCanvasContainer();
  if (!mapCanvasContainer) return;

  updateVisualRotationTarget();

  const diff = angleDiff(visualRotationCurrent, visualRotationTarget);
  if (Math.abs(diff) < CSS_ROTATE_MIN_DIFF) return;

  visualRotationCurrent = normalizeDeg(visualRotationCurrent + diff * CSS_ROTATE_LERP);

  // MapLibre 재렌더링 없이 최종 화면만 GPU로 회전
  mapCanvasContainer.style.transform = `rotate(${visualRotationCurrent}deg)`;
}

/* =========================================================
   보트 아이콘
========================================================= */
function boatSvg(size = 52) {
  return `
    <svg width="${size}" height="${size}" viewBox="0 0 64 64">
      <defs>
        <filter id="boatShadow${size}" x="-30%" y="-30%" width="160%" height="160%">
          <feDropShadow dx="0" dy="3" stdDeviation="2.2" flood-opacity="0.48"/>
        </filter>
      </defs>
      <g filter="url(#boatShadow${size})">
        <path d="M32 4 C42 16 48 34 42 54 C39 60 25 60 22 54 C16 34 22 16 32 4 Z"
          fill="#007aff" stroke="#ffffff" stroke-width="3.5" stroke-linejoin="round"/>
        <path d="M32 9 C38 21 41 36 36 51 C35 54 29 54 28 51 C23 36 26 21 32 9 Z"
          fill="rgba(255,255,255,0.28)"/>
        <path d="M32 4 L39 20 L32 16 L25 20 Z" fill="#ffffff" opacity="0.95"/>
        <circle cx="32" cy="39" r="5.5" fill="#ffffff" opacity="0.96"/>
      </g>
    </svg>`;
}

function makeBoatElement() {
  const el = document.createElement("div");
  el.className = "boat";
  el.innerHTML = boatSvg(52);
  return el;
}

function createFixedBoat() {
  fixedBoat.innerHTML = boatSvg(56);
}

function updateBoat(pos) {
  if (!boatMarker) {
    boatMarker = new maplibregl.Marker({
      element: makeBoatElement(),
      anchor: "center",
      rotationAlignment: "viewport"
    }).setLngLat(pos).addTo(map);
  } else {
    boatMarker.setLngLat(pos);
  }

  const markerEl = boatMarker.getElement();

  if (headingUp && followBoat) {
    // 헤딩업+추적 모드에서는 화면 중앙 고정 보트 사용
    fixedBoat.style.display = "block";
    markerEl.style.display = "none";
  } else {
    fixedBoat.style.display = "none";
    markerEl.style.display = "block";

    // 헤딩업만 ON이고 추적은 OFF인 경우: 맵 위 마커는 화면상 위를 향하게 보정
    // 헤딩OFF: 실제 방향으로 회전
    const rotation = headingUp ? 0 : finalHeading;
    markerEl.style.transform = `translate(-50%, -50%) rotate(${normalizeDeg(rotation)}deg)`;
  }
}

/* =========================================================
   거리 링
========================================================= */
function circlePolygon(center, radiusMeters, points = 96) {
  const coords = [];
  for (let i = 0; i <= points; i++) {
    coords.push(destinationPoint(center, radiusMeters, 360 * i / points));
  }
  return {
    type: "Feature",
    properties: { radius: radiusMeters },
    geometry: { type: "Polygon", coordinates: [coords] }
  };
}

function labelPoint(center, radiusMeters) {
  return {
    type: "Feature",
    properties: { label: radiusMeters + "m", radius: radiusMeters },
    geometry: { type: "Point", coordinates: destinationPoint(center, radiusMeters, 90) }
  };
}

function createRangeRings() {
  map.addSource("range-rings", {
    type: "geojson",
    data: { type: "FeatureCollection", features: [] }
  });

  map.addLayer({
    id: "range-rings-fill",
    type: "fill",
    source: "range-rings",
    paint: { "fill-color": "#007aff", "fill-opacity": 0.010 }
  });

  map.addLayer({
    id: "range-rings-line",
    type: "line",
    source: "range-rings",
    paint: {
      "line-color": "#007aff",
      "line-width": ["case", ["in", ["get", "radius"], ["literal", [20,30,40,50]]], 2.0, 0.9],
      "line-opacity": ["case", ["in", ["get", "radius"], ["literal", [20,30,40,50]]], 0.88, 0.45]
    }
  });

  map.addSource("range-labels", {
    type: "geojson",
    data: { type: "FeatureCollection", features: [] }
  });

  map.addLayer({
    id: "range-labels-layer",
    type: "symbol",
    source: "range-labels",
    layout: {
      "text-field": ["get", "label"],
      "text-size": 10,
      "text-anchor": "center",
      "text-allow-overlap": true,
      "text-ignore-placement": true
    },
    paint: {
      "text-color": "#005fcc",
      "text-halo-color": "#ffffff",
      "text-halo-width": 1.5
    }
  });
}

function updateRangeRings(center) {
  if (!map.getSource("range-rings")) return;

  map.getSource("range-rings").setData({
    type: "FeatureCollection",
    features: RING_METERS.map(r => circlePolygon(center, r))
  });

  map.getSource("range-labels").setData({
    type: "FeatureCollection",
    features: RING_METERS.map(r => labelPoint(center, r))
  });
}

/* =========================================================
   진행선
========================================================= */
function createHeadingLine() {
  map.addSource("heading-line", {
    type: "geojson",
    data: { type: "FeatureCollection", features: [] }
  });

  map.addLayer({
    id: "heading-line-layer",
    type: "line",
    source: "heading-line",
    paint: {
      "line-color": "#ff3b30",
      "line-width": 2.4,
      "line-opacity": 0.90,
      "line-dasharray": [1.4, 1]
    }
  });

  map.addLayer({
    id: "heading-line-label",
    type: "symbol",
    source: "heading-line",
    filter: ["==", ["get", "type"], "label"],
    layout: {
      "text-field": ["get", "label"],
      "text-size": 11,
      "text-anchor": "bottom",
      "text-allow-overlap": true,
      "text-ignore-placement": true
    },
    paint: {
      "text-color": "#ff3b30",
      "text-halo-color": "#ffffff",
      "text-halo-width": 1.6
    }
  });
}

function updateHeadingLine(center) {
  if (!map.getSource("heading-line")) return;

  const end = destinationPoint(center, HEADING_LINE_METERS, finalHeading);

  map.getSource("heading-line").setData({
    type: "FeatureCollection",
    features: [
      {
        type: "Feature",
        properties: { type: "line" },
        geometry: { type: "LineString", coordinates: [center, end] }
      },
      {
        type: "Feature",
        properties: { type: "label", label: "50m" },
        geometry: { type: "Point", coordinates: end }
      }
    ]
  });
}

/* =========================================================
   헤딩 결정
========================================================= */
function chooseHeading(speed) {
  if (compassHeading !== null && !isNaN(compassHeading)) {
    finalHeading = smoothAngle(finalHeading, compassHeading, COMPASS_SMOOTH);
    return "나침반";
  }

  if (gpsHeading !== null && !isNaN(gpsHeading)) {
    finalHeading = smoothAngle(finalHeading, gpsHeading, GPS_HEAD_SMOOTH);
    return "GPS";
  }

  return "대기";
}

/* =========================================================
   업데이트
========================================================= */
function updateInfo(accuracy, speed, source) {
  info.innerHTML =
    `📍${accuracy ? Math.round(accuracy) + "m" : "-"} · 🧭${formatHeading(finalHeading)}(${source}) · 🚤${formatSpeed(speed)}<br>` +
    `헤딩:<b>${headingUp ? "ON" : "OFF"}</b> · 추적:<b>${followBoat ? "ON" : "OFF"}</b> · ⭕5/10/20/30/40/50m · 🔴50m`;
}

function updateAll(pos, accuracy, speed, source) {
  if (!pos) return;

  updateBoat(pos);
  updateRangeRings(pos);
  updateHeadingLine(pos);

  if (followBoat) {
    const now = Date.now();

    if (now - lastCenterUpdateAt > 350) {
      lastCenterUpdateAt = now;

      map.easeTo({
        center: pos,
        duration: 260,
        easing: t => t
      });
    }
  }

  updateInfo(accuracy, speed, source);
}

/* =========================================================
   나침반
========================================================= */
window.enableCompass = async function() {
  try {
    if (
      typeof DeviceOrientationEvent !== "undefined" &&
      typeof DeviceOrientationEvent.requestPermission === "function"
    ) {
      const result = await DeviceOrientationEvent.requestPermission();
      if (result !== "granted") {
        alert("나침반 권한이 거부되었습니다.");
        return;
      }
    }

    window.addEventListener("deviceorientationabsolute", onOrientation, true);
    window.addEventListener("deviceorientation", onOrientation, true);

    compassEnabled = true;
    updateButtons();
  } catch (e) {
    alert("나침반 권한 요청 실패: " + e.message);
  }
};

function onOrientation(e) {
  let h = null;

  if (e.webkitCompassHeading !== undefined && e.webkitCompassHeading !== null) {
    h = e.webkitCompassHeading;
  } else if (e.alpha !== null && e.alpha !== undefined) {
    h = 360 - e.alpha;
  }

  if (h === null || isNaN(h)) return;

  compassHeading = smoothAngle(compassHeading, normalizeDeg(h), COMPASS_SMOOTH);
  const source = chooseHeading(0);

  // 나침반에서는 방향값과 정보만 갱신. 무거운 GeoJSON 갱신 없음.
  updateInfo(null, 0, source);
}

/* =========================================================
   GPS
========================================================= */
function startGPS() {
  if (!navigator.geolocation) {
    info.innerHTML = "GPS를 지원하지 않는 브라우저입니다.";
    return;
  }

  navigator.geolocation.watchPosition(
    pos => {
      const now = Date.now();
      if (now - lastGpsAt < 700) return;
      lastGpsAt = now;

      const lat = pos.coords.latitude;
      const lng = pos.coords.longitude;
      const accuracy = pos.coords.accuracy;
      const speed = pos.coords.speed;
      const heading = pos.coords.heading;

      if (accuracy && accuracy > MAX_GPS_ACCURACY_DROP) {
        updateInfo(accuracy, speed, "정확도낮음");
        return;
      }

      const raw = [lng, lat];
      currentLngLat = raw;

      if (heading !== null && heading !== undefined && !isNaN(heading)) {
        gpsHeading = normalizeDeg(heading);
      }

      if (smoothedLngLat && distanceMeters(smoothedLngLat, raw) < MIN_MOVE_METERS) {
        const source = chooseHeading(speed);
        updateAll(smoothedLngLat, accuracy, speed, source);
        return;
      }

      const factor = accuracy && accuracy > WEAK_GPS_ACCURACY ? POS_SMOOTH_WEAK : POS_SMOOTH_GOOD;

      smoothedLngLat = smoothPosition(smoothedLngLat, raw, factor);

      const source = chooseHeading(speed);
      updateAll(smoothedLngLat, accuracy, speed, source);
    },
    err => {
      info.innerHTML = "GPS 오류. HTTPS 주소와 Safari 위치 권한을 확인하세요.";
    },
    {
      enableHighAccuracy: true,
      maximumAge: 500,
      timeout: 15000
    }
  );
}

/* =========================================================
   버튼
========================================================= */
window.goToMe = function() {
  if (!navigator.geolocation) {
    alert("위치 서비스를 지원하지 않습니다.");
    return;
  }

  navigator.geolocation.getCurrentPosition(
    pos => {
      const now = [pos.coords.longitude, pos.coords.latitude];

      currentLngLat = now;
      smoothedLngLat = now;
      followBoat = true;

      if (pos.coords.heading !== null && pos.coords.heading !== undefined && !isNaN(pos.coords.heading)) {
        gpsHeading = normalizeDeg(pos.coords.heading);
      }

      const source = chooseHeading(pos.coords.speed);

      map.easeTo({
        center: now,
        zoom: Math.max(map.getZoom(), 17),
        duration: 300
      });

      updateAll(now, pos.coords.accuracy, pos.coords.speed, source);
      updateButtons();
    },
    () => alert("현재 위치를 가져오지 못했습니다. 위치 권한을 확인하세요."),
    {
      enableHighAccuracy: true,
      timeout: 12000,
      maximumAge: 0
    }
  );
};

window.toggleHeadingUp = function() {
  headingUp = !headingUp;

  if (!headingUp) {
    visualRotationTarget = 0;
  } else {
    if (!compassEnabled) {
      alert("제자리 회전까지 정확히 보려면 먼저 ‘나침반’을 누르세요.");
    }

    // 헤딩업을 켤 때 현장 사용 기준으로 추적도 켜준다.
    if (smoothedLngLat) followBoat = true;
  }

  if (smoothedLngLat) updateAll(smoothedLngLat, null, 0, chooseHeading(0));
  updateButtons();
};

window.toggleFollow = function() {
  followBoat = !followBoat;

  if (followBoat && smoothedLngLat) {
    map.easeTo({
      center: smoothedLngLat,
      zoom: Math.max(map.getZoom(), 17),
      duration: 220
    });
  }

  if (smoothedLngLat) updateBoat(smoothedLngLat);
  updateButtons();
};
</script>
</body>
</html>
