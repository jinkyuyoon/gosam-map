<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>고삼저수지 보트 GPS</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Leaflet 지도 회전 플러그인 -->
  <script src="https://unpkg.com/leaflet-rotate@0.2.8/dist/leaflet-rotate-src.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #071018;
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      -webkit-user-select: none;
      user-select: none;
    }

    #map {
      width: 100%;
      height: 100dvh;
      background: #071018;
      filter: saturate(.82) contrast(1.06) brightness(.78);
    }

    #map::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 450;
      pointer-events: none;
      background:
        radial-gradient(circle at 50% 44%, rgba(55,255,255,.09), transparent 28%),
        linear-gradient(180deg, rgba(2,8,12,.12), rgba(2,8,12,.36));
      mix-blend-mode: screen;
    }

    .controls {
      position: absolute;
      top: calc(184px + env(safe-area-inset-top));
      right: 18px;
      z-index: 1001;
      display: flex;
      flex-direction: column;
      gap: 18px;
      pointer-events: none;
    }

    button {
      pointer-events: auto;
      width:42px;
      height:42px;
      border: 1px solid rgba(235,255,255,.22);
      border-radius: 14px;
      background:
        radial-gradient(circle at 34% 16%, rgba(255,255,255,.20), rgba(255,255,255,0) 36%),
        linear-gradient(180deg, rgba(255,255,255,.13), rgba(255,255,255,.035)),
        rgba(7,14,18,.18);
      backdrop-filter: blur(40px) saturate(170%);
      -webkit-backdrop-filter: blur(40px) saturate(170%);
      color: rgba(246,255,255,.96);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.22),
        inset 0 -1px 0 rgba(0,0,0,.30),
        0 16px 36px rgba(0,0,0,.42);
      padding: 0;
      -webkit-tap-highlight-color: transparent;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      font-size:11px;
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -.2px;
    }

    button.dark {
      background:
        radial-gradient(circle at 34% 16%, rgba(255,255,255,.18), rgba(255,255,255,0) 36%),
        linear-gradient(180deg, rgba(255,255,255,.11), rgba(255,255,255,.025)),
        rgba(7,14,18,.44);
    }

    button.active {
  background:
    radial-gradient(circle at 38% 18%, rgba(255,255,255,.35), rgba(255,255,255,0) 34%),
    linear-gradient(180deg, rgba(60,255,255,.25), rgba(8,92,98,.28)),
    rgba(13,210,215,.12);

  border-color: rgba(111,255,255,.45);

  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.28),
    0 0 14px rgba(51,240,245,.18),
    0 8px 20px rgba(0,0,0,.35);
}

    .control-icon {
      width: 22px;
      height: 22px;
      display: block;
      stroke: currentColor;
      fill: none;
      stroke-width: 2.6;
      stroke-linecap: round;
      stroke-linejoin: round;
      filter: drop-shadow(0 0 10px rgba(255,255,255,.12));
    }

    button.active .control-icon {
      filter: drop-shadow(0 0 13px rgba(68,255,255,.72));
    }

    .control-icon.fill {
      fill: currentColor;
      stroke: none;
    }

    .boat-wrap {
      width: 64px;
      height: 64px;
      transform-origin: 50% 50%;
      will-change: transform;
    }

    .leaflet-control-attribution,
    .leaflet-control-container .leaflet-top.leaflet-left {
      display: none;
    }

    .ring-label {
      color: rgba(236,246,250,.72);
      font-size: 15px;
      font-weight: 700;
      letter-spacing: .1px;
      background: transparent;
      border: none;
      box-shadow: none;
      text-shadow:
        0 1px 3px rgba(0,0,0,.8),
        0 0 12px rgba(255,255,255,.18);
      white-space: nowrap;
    }

    .heading-label { display: none; }

    .hud-card {
      position: absolute;
      z-index: 1000;
      pointer-events: none;
      border: 1px solid rgba(255,255,255,.08);
      background:
        radial-gradient(circle at 28% 12%, rgba(255,255,255,.18), rgba(255,255,255,0) 36%),
        linear-gradient(180deg, rgba(255,255,255,.13), rgba(255,255,255,.035)),
        rgba(6,15,18,.20);
      backdrop-filter: blur(40px) saturate(170%);
      -webkit-backdrop-filter: blur(40px) saturate(170%);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.22),
        0 8px 24px rgba(0,0,0,.22);
      color: rgba(246,255,255,.96);
    }

    #gpsCard {
      top: calc(22px + env(safe-area-inset-top));
      left: 18px;
      width:72px;
      border-radius: 22px;
      padding:6px 8px;
    }

    .gps-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: #40F7FF;
      font-size:13px;
      font-weight: 800;
      letter-spacing: .2px;
      margin-bottom: 18px;
    }

    .bars {
      display: flex;
      align-items: flex-end;
      gap: 3px;
      height: 24px;
    }

    .bars i {
      display: block;
      width: 4px;
      border-radius: 3px;
      background: #40F7FF;
      box-shadow: 0 0 8px rgba(64,247,255,.35);
    }

    .bars i:nth-child(1) { height: 7px; opacity: .6; }
    .bars i:nth-child(2) { height: 12px; opacity: .75; }
    .bars i:nth-child(3) { height: 17px; opacity: .9; }
    .bars i:nth-child(4) { height: 22px; }

    .gps-line {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: baseline;
      margin: 11px 0;
      font-size: 15px;
      color: rgba(255,255,255,.78);
      white-space: nowrap;
    }

    .gps-line strong {
      color: #40F7FF;
      font-size:11px;
      font-weight: 900;
      letter-spacing: -.4px;
      text-shadow: 0 0 12px rgba(64,247,255,.28);
    }

    #dataCard {
      left: 22px;
      bottom: calc(22px + env(safe-area-inset-bottom));
      width:120px;
      border-radius: 24px;
      padding: 12px 12px 10px;
    }

    .data-block {
      padding: 0 0 17px;
      margin-bottom: 17px;
      border-bottom: 1px solid rgba(255,255,255,.25);
    }

    .data-block:last-child {
      border-bottom: none;
      margin-bottom: 0;
      padding-bottom: 0;
    }

    .data-label {
      color: rgba(255,255,255,.88);
      font-size: 17px;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .data-value {
      color: #40F7FF;
      font-size:16px;
      font-weight: 300;
      line-height: 1;
      letter-spacing: -1px;
      text-shadow: 0 0 16px rgba(64,247,255,.26);
    }

    .data-unit {
      color: rgba(255,255,255,.86);
      font-size: 19px;
      font-weight: 500;
      margin-left: 4px;
    }

    .data-sub {
      color: rgba(255,255,255,.80);
      font-size: 18px;
      margin-left: 6px;
    }

    #scaleBar {
      position: absolute;
      right: 26px;
      bottom: calc(24px + env(safe-area-inset-bottom));
      z-index: 1000;
      width: 260px;
      height:42px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,.08);
      background:
        linear-gradient(180deg, rgba(255,255,255,.12), rgba(255,255,255,.035)),
        rgba(6,15,18,.20);
      backdrop-filter: blur(40px) saturate(170%);
      -webkit-backdrop-filter: blur(40px) saturate(170%);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.20),
        0 8px 24px rgba(0,0,0,.22);
      color: rgba(255,255,255,.96);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      font-size:11px;
      font-weight: 700;
      pointer-events: none;
    }

    #scaleLine {
      width: 124px;
      height: 18px;
      position: relative;
      border-bottom: 3px solid rgba(255,255,255,.94);
      background: repeating-linear-gradient(
        90deg,
        transparent 0,
        transparent 24px,
        rgba(255,255,255,.94) 24px,
        rgba(255,255,255,.94) 27px
      );
    }

    #scaleLine::before,
    #scaleLine::after {
      content: "";
      position: absolute;
      bottom: -3px;
      width: 3px;
      height: 12px;
      background: rgba(255,255,255,.94);
    }

    #scaleLine::before { left: 0; }
    #scaleLine::after { right: 0; }

    .accuracy-label {
      color: #40F7FF;
      font-size: 18px;
      font-weight: 800;
      text-shadow: 0 0 12px rgba(64,247,255,.45), 0 1px 3px rgba(0,0,0,.8);
      white-space: nowrap;
    }

    .pin-delete-btn {
      width: auto;
      height: auto;
      border-radius: 10px;
      padding: 8px 10px;
      font-size:10px;
    }

    @media (max-width: 430px) {
      .controls {
        top: calc(160px + env(safe-area-inset-top));
        right: 10px;
        gap: 12px;
      }

      button {
        width: 64px;
        height: 84px;
        border-radius: 17px;
        font-size: 12px;
        gap: 8px;
      }

      .control-icon {
        width: 32px;
        height: 32px;
      }

      #gpsCard {
        width:72px;
        padding: 14px 15px 12px;
        border-radius: 14px;
      }

      .gps-title {
        font-size:11px;
        margin-bottom: 13px;
      }

      .gps-line {
        font-size:10px;
        margin: 8px 0;
      }

      .gps-line strong {
        font-size: 19px;
      }

      #dataCard {
        width:120px;
        padding: 16px 18px;
      }

      .data-label {
        font-size: 15px;
      }

      .data-value {
        font-size: 34px;
      }

      .data-unit,
      .data-sub {
        font-size: 15px;
      }

      #scaleBar {
        width: 180px;
        height: 50px;
        right: 12px;
        font-size: 17px;
        gap: 12px;
      }

      #scaleLine {
        width: 88px;
      }

      .boat-wrap {
        width: 58px;
        height:42px;
      }
    }
  </style>
</head>

<body>
<div id="map"></div>

<div id="stopwatchCard" class="hud-card" onclick="toggleStopwatch()" style="left:12px;bottom:110px;width:72px;border-radius:16px;padding:7px 8px;text-align:center;pointer-events:auto;cursor:pointer;">
<div style="font-size:9px;opacity:.9;">TIMER</div>
<div id="stopwatchDisplay" style="color:#40F7FF;font-size:14px;font-weight:700;">00:00</div>
</div>


<div id="measureCard" class="hud-card" style="left:12px;bottom:240px;width:72px;border-radius:16px;padding:7px 8px;text-align:center;">
<div style="font-size:9px;opacity:.9;">RANGE</div>
<div id="measureDisplay" style="color:#40F7FF;font-size:14px;font-weight:700;">--</div>
</div>

<div id="pinDistanceCard" class="hud-card" style="left:12px;bottom:175px;width:72px;border-radius:16px;padding:7px 8px;text-align:center;">
<div style="font-size:9px;opacity:.9;">PIN</div>
<div id="pinDistanceDisplay" style="color:#40F7FF;font-size:14px;font-weight:700;">--</div>
</div>

<div id="dataCard" class="hud-card">
  <div class="data-block">
    <div class="data-label">속도</div>
    <div><span id="hudSpeed" class="data-value">--</span><span class="data-unit">km/h</span></div>
  </div>
  <div class="data-block">
    <div class="data-label">방향</div>
    <div><span id="hudHeading" class="data-value">--</span><span id="hudDir" class="data-sub"></span></div>
  </div>
  
</div>



<div class="controls">
  <button id="locBtn" onclick="goToMe()" aria-label="내 위치" title="내 위치">
    <svg class="control-icon" viewBox="0 0 32 32"><path d="M16 3v5M16 24v5M3 16h5M24 16h5"/><circle cx="16" cy="16" r="7"/><circle cx="16" cy="16" r="2.3" fill="currentColor" stroke="none"/></svg>
    
  </button>
  <button id="headingBtn" class="dark" onclick="toggleHeadingUp()" aria-label="헤딩업" title="헤딩업">
    <svg class="control-icon fill" viewBox="0 0 32 32"><path d="M16 4l11 24-11-6-11 6z"/></svg>
    
  </button>
  <button id="measureBtn" onclick="toggleMeasureMode()" title="거리 측정">
    <svg class="control-icon" viewBox="0 0 32 32">
      <path d="M6 22 L26 10"/>
      <path d="M9 20 L11 23 M14 17 L16 20 M19 14 L21 17 M24 11 L26 14"/>
    </svg>
  </button>
  <button id="pinBtn" onclick="addPinHere()" title="핀 추가">
    <svg class="control-icon" viewBox="0 0 32 32"><path d="M16 6v20M6 16h20"/></svg>
    
  </button>
</div>


<div id="pinHudCard" style="display:none;position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);z-index:5000;width:320px;max-width:85vw;padding:18px;border-radius:24px;
background:linear-gradient(180deg,rgba(8,20,24,.96),rgba(4,12,16,.96));
border:1px solid rgba(64,247,255,.25);backdrop-filter:blur(20px);
box-shadow:0 0 30px rgba(64,247,255,.12),0 20px 60px rgba(0,0,0,.5);color:white;">
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
<div id="pinHudTitle" style="font-size:24px;font-weight:800;color:#40F7FF"></div>
<div onclick="hidePinHud()" style="cursor:pointer;font-size:28px;color:#40F7FF">×</div>
</div>
<div id="pinHudDate" style="opacity:.7;margin-bottom:10px"></div>
<div id="pinHudDistance" style="font-size:18px;color:#40F7FF;margin-bottom:12px"></div>
<div id="pinHudMemo" style="white-space:pre-wrap;border:1px solid rgba(64,247,255,.18);padding:12px;border-radius:12px;margin-bottom:14px"></div>
<div style="display:flex;gap:10px">
<button class="pin-delete-btn" style="flex:1;width:auto;height:42px;font-size:14px;" onclick="editPin(window.currentPinIndex)">✏ 수정</button>
<button class="pin-delete-btn" style="flex:1;width:auto;height:42px;font-size:14px;" onclick="deletePin(window.currentPinIndex)">🗑 삭제</button>
</div>
</div>

<script>
/* =========================================================
   설정
========================================================= */
const IMAGE_URL = "gosam-low-water-optimized.jpg";

const INITIAL_CENTER = [37.082, 127.283];
const INITIAL_ZOOM = 18;

// Leaflet bounds: [[south, west], [north, east]]
const IMAGE_BOUNDS = [
  [37.07270, 127.269358],
  [37.09483, 127.297100]
];

const RING_METERS = [5,10,20,30,40,50];
const HEADING_LINE_METERS = 50;

const MAX_GPS_ACCURACY_DROP = 80;
const WEAK_GPS_ACCURACY = 25;
const MIN_MOVE_METERS = 2.5;

const POS_SMOOTH_GOOD = 0.20;
const POS_SMOOTH_WEAK = 0.12;
const COMPASS_SMOOTH = 0.20;
const GPS_HEAD_SMOOTH = 0.16;

// Leaflet rotate 방향이 반대로 느껴지면 -1로 바꾸면 됨
const HEADING_BEARING_SIGN = 1;
const HEADING_OFFSET = 0;

// 회전 안정화
const BEARING_UPDATE_MS = 40;
const BEARING_MIN_DIFF = 2;

/* =========================================================
   지도 생성
========================================================= */
const map = L.map("map", {
  center: INITIAL_CENTER,
  zoom: INITIAL_ZOOM,
  zoomControl: false,
  attributionControl: false,
  rotate: true,
  touchRotate: false,
  bearing: 0,
  inertia: true,
  preferCanvas: true
});

L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", {
  maxZoom: 19,
  crossOrigin: true
}).addTo(map);

L.imageOverlay(IMAGE_URL, IMAGE_BOUNDS, {
  opacity: 0.92,
  interactive: false
}).addTo(map);

/* =========================================================
   상태
========================================================= */
const compassBtn = document.getElementById("compassBtn");
const headingBtn = document.getElementById("headingBtn");
const followBtn = document.getElementById("followBtn");

const hudAccuracy = document.getElementById("hudAccuracy");
const hudSpeed = document.getElementById("hudSpeed");
const hudHeading = document.getElementById("hudHeading");
const hudDir = document.getElementById("hudDir");


let headingUp = false;
let followBoat = false; // starts disabled
let compassEnabled = false;

let currentLatLng = null;
let smoothedLatLng = null;

let pinMode = false;

let compassHeading = null;
let gpsHeading = null;
let finalHeading = 0;

let boatMarker = null;
let boatWrapEl = null;
let lastGpsAt = 0;
let lastCenterUpdateAt = 0;
let lastBearingUpdateAt = 0;
let lastBearingApplied = 0;

let userInteractingUntil = 0;
let lastSpeedCalcPos = null;
let lastSpeedCalcTime = null;
let calculatedSpeedKmh = 0;
let lastAccuracy = null;
let lastSpeed = null;
let lastAltitude = null;

/* =========================================================
   사용자 조작 감지
========================================================= */
function markUserInteracting() {
  userInteractingUntil = Date.now() + 700;
}

["dragstart", "zoomstart", "movestart"].forEach(ev => {
  map.on(ev, () => {
    if (!map._programmaticMove) {
      markUserInteracting();

      followBoat = false;
      headingUp = false;

      if (typeof map.setBearing === "function") {
        map.setBearing(0);
      }

      updateButtons();
    }
  });
});

function isUserInteracting() {
  return Date.now() < userInteractingUntil;
}

function programmatic(fn, duration = 300) {
  map._programmaticMove = true;
  fn();
  setTimeout(() => { map._programmaticMove = false; }, duration);
}

  map.on("click", function(e) {

  if (!pinMode) return;

  pinMode = false;

  if (!confirm("여기에 핀을 추가하시겠습니까?")) {
    return;
  }

  const pins = JSON.parse(localStorage.getItem("gosamPins") || "[]");

  pins.push({
    lat: e.latlng.lat,
    lng: e.latlng.lng,
    name: "Point " + (pins.length + 1),
    createdAt: Date.now()
  });

  localStorage.setItem(
    "gosamPins",
    JSON.stringify(pins)
  );

  loadPins();

});
/* =========================================================
   유틸
========================================================= */
function normalizeDeg(d) {
  d = d % 360;
  return d < 0 ? d + 360 : d;
}

function angleDiff(from, to) {
  return ((to - from + 540) % 360) - 180;
}

function smoothAngle(prev, next, factor) {
  if (prev === null || prev === undefined || isNaN(prev)) return normalizeDeg(next);
  return normalizeDeg(prev + angleDiff(prev, next) * factor);
}

function smoothLatLng(prev, next, factor) {
  if (!prev) return next;
  return L.latLng(
    prev.lat + (next.lat - prev.lat) * factor,
    prev.lng + (next.lng - prev.lng) * factor
  );
}

function formatSpeed(s) {
  if (s === null || s === undefined || isNaN(s)) return "-";
  return (s * 3.6).toFixed(1) + "km/h";
}

function formatHeading(h) {
  if (h === null || h === undefined || isNaN(h)) return "-";
  return Math.round(normalizeDeg(h)) + "°";
}

function destinationPoint(center, meters, bearingDeg) {
  const R = 6371000;
  const brng = bearingDeg * Math.PI / 180;
  const lat1 = center.lat * Math.PI / 180;
  const lng1 = center.lng * Math.PI / 180;

  const lat2 = Math.asin(
    Math.sin(lat1) * Math.cos(meters / R) +
    Math.cos(lat1) * Math.sin(meters / R) * Math.cos(brng)
  );

  const lng2 = lng1 + Math.atan2(
    Math.sin(brng) * Math.sin(meters / R) * Math.cos(lat1),
    Math.cos(meters / R) - Math.sin(lat1) * Math.sin(lat2)
  );

  return L.latLng(lat2 * 180 / Math.PI, lng2 * 180 / Math.PI);
}


function headingToDir(deg) {
  if (deg === null || deg === undefined || isNaN(deg)) return "";
  const dirs = ["N","NE","E","SE","S","SW","W","NW"];
  return dirs[Math.round(normalizeDeg(deg) / 45) % 8];
}

function updateHUD(accuracy, speed, altitude) {
  if (accuracy !== null && accuracy !== undefined && !isNaN(accuracy)) {
    lastAccuracy = accuracy;
  }

  if (hudAccuracy) {
    hudAccuracy.textContent = lastAccuracy
      ? lastAccuracy.toFixed(1) + " m"
      : "--";
  }

  if (hudSpeed) {
    hudSpeed.textContent = calculatedSpeedKmh.toFixed(1);
  }

  if (hudHeading) {
    hudHeading.textContent = Math.round(normalizeDeg(finalHeading)) + "°";
  }

  if (hudDir) {
    hudDir.textContent = headingToDir(finalHeading);
  }
}



function calculateSpeed(latlng) {
  const now = Date.now();

  if (!lastSpeedCalcPos) {
    lastSpeedCalcPos = latlng;
    lastSpeedCalcTime = now;
    return calculatedSpeedKmh;
  }

  const dist = lastSpeedCalcPos.distanceTo(latlng);
  const sec = (now - lastSpeedCalcTime) / 1000;

  if (sec > 0.8) {
    calculatedSpeedKmh = (dist / sec) * 3.6;
    lastSpeedCalcPos = latlng;
    lastSpeedCalcTime = now;
  }

  return calculatedSpeedKmh;
}

function updateButtons() {
  if (compassBtn) compassBtn.classList.toggle("active", compassEnabled);
  headingBtn.classList.toggle("active", headingUp);
  if (followBtn) followBtn.classList.toggle("active", followBoat);
  updateHUD(null, null, null);
}

/* =========================================================
   보트 아이콘
========================================================= */
function boatSvg(size = 64) {
  return `
  <svg width="${size}" height="${size}" viewBox="0 0 84 84">
    <defs>
      <linearGradient id="hullGrad${size}" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#FFFFFF"/>
        <stop offset="46%" stop-color="#AFFFFF"/>

function createBoatIcon(rotation) {
  return L.divIcon({
    className: "",
    html: `<div id="boatWrap" class="boat-wrap" style="transform: rotate(${rotation}deg);">${boatSvg(64)}</div>`,
    iconSize: [64, 64],
    iconAnchor: [32, 32]
  });
}

function getBoatRotation() {
  // 헤딩업 ON: 지도 자체가 회전하므로 보트는 화면 위쪽 고정
  // 헤딩업 OFF: 보트 아이콘이 나침반/방향값을 따라 회전
  return headingUp ? 0 : finalHeading;
}

function updateBoatRotationOnly() {
  if (!boatWrapEl) {
    boatWrapEl = document.getElementById("boatWrap");
  }
  if (!boatWrapEl) return;

  boatWrapEl.style.transform = `rotate(${normalizeDeg(getBoatRotation())}deg)`;
}

function updateBoat(pos) {
  if (!boatMarker) {
    boatMarker = L.marker(pos, {
      icon: createBoatIcon(getBoatRotation()),
      interactive: false
    }).addTo(map);

    boatWrapEl = document.getElementById("boatWrap");
  } else {
    boatMarker.setLatLng(pos);
  }

  // 중요: GPS 이벤트에서는 위치만 갱신하고, 아이콘 재생성은 하지 않는다.
  // 회전은 나침반 이벤트에서 CSS transform으로 즉시 갱신한다.
  updateBoatRotationOnly();
}

/* =========================================================
   거리 링 / 진행선
========================================================= */
const ringLayer = L.layerGroup().addTo(map);
const labelLayer = L.layerGroup().addTo(map);
let headingLine = null;
let headingLabel = null;
let accuracyCircle = null;
let accuracyLabel = null;
let headingCone = [];
let trailLine = null;
let trailPoints = [];
let nearestPinDistance=null;
let pinAlert30m=false;
let pinAlert10m=false;

let pinLayer = L.layerGroup().addTo(map);  
  
const ringCircles = {};
const ringLabels = {};
  
function createRangeRings() {
  RING_METERS.forEach(r => {
    L.circle(INITIAL_CENTER, {
      radius: r,
      color: "#40F7FF",
      weight: 6,
      opacity: 0.10,
      fillOpacity: 0,
      interactive: false
    }).addTo(ringLayer);
    
    const circle = L.circle(INITIAL_CENTER, {
      radius: r,
      color: "#40F7FF",
      weight: 1.0,
      opacity:
        r >= 50 ? 0.9 :
        r >= 40 ? 0.5 :
        r >= 30 ? 0.9 :
        r >= 20 ? 0.5 :
        r >= 10 ? 0.9 :
        0.9,
      fillOpacity: 0,
      dashArray: "1,3",
      lineCap: "round",
      interactive: false
    }).addTo(ringLayer);

    ringCircles[r] = circle;

    if (r !== 5) {
      const label = L.marker(INITIAL_CENTER, {
        icon: L.divIcon({
          className: "ring-label",
          html: `${r}m`,
          iconSize: [30, 14],
          iconAnchor: [15, 7]
        }),
        interactive: false
      }).addTo(labelLayer);

      ringLabels[r] = label;
    }
  });
}

function updateRangeRings(center) {
  RING_METERS.forEach(r => {
    ringCircles[r].setLatLng(center);

    if (ringLabels[r]) {
      ringLabels[r].setLatLng(
        destinationPoint(center, r, headingUp ? finalHeading : 0)
      );
    }
  });
}

function createHeadingLine() {}
function updateHeadingLine(center) {}



function createHeadingCone() {
  headingCone = [];

  const opacities = [0.12, 0.10, 0.08, 0.06, 0.04];

  opacities.forEach(opacity => {
    const cone = L.polygon([], {
      color: "transparent",
      weight: 0,
      fillColor: "#FFB347",
      fillOpacity: opacity,
      interactive: false
    }).addTo(map);

    headingCone.push(cone);
  });
}

function updateHeadingCone(center) {
  if (!headingCone || !headingCone.length) return;

  const ranges = [15, 25, 35, 50, 65];
  const spread = 24;

  ranges.forEach((dist, idx) => {

    const pts = [center];

    for (let a = finalHeading - spread; a <= finalHeading + spread; a += 2) {
      pts.push(
        destinationPoint(center, dist, a)
      );
    }

    headingCone[idx].setLatLngs([pts]);
  });
}
  
function createTrailLine() {
  trailLine = L.polyline([], {
    color: "rgba(255,255,255,.44)",
    weight: 1.3,
    opacity: 0.62,
    dashArray: "1,9",
    lineCap: "round",
    interactive: false
  }).addTo(map);
}

function updateTrail(pos) {
  if (!trailLine || !pos) return;

  const last = trailPoints[trailPoints.length - 1];
  if (!last || last.distanceTo(pos) > 1.8) {
    trailPoints.push(pos);
  }

  if (trailPoints.length > 28) {
    trailPoints.shift();
  }

  trailLine.setLatLngs(trailPoints);
}

function ensureAccuracyLabel(center, accuracy) { return; }


function ensureAccuracyCircle(center, accuracy){
  const a = Math.max(1, accuracy || 1);

  // 정확도 5m 이하면 숨김
  if (a <= 3) {
    if (accuracyCircle) {
      map.removeLayer(accuracyCircle);
      accuracyCircle = null;
    }
    return;
  }

  let color = "rgba(255,179,71,.72)";

  if (!accuracyCircle) {
    accuracyCircle = L.circle(center, {
      radius: a,
      color: color,
      fillColor: color,
      fillOpacity: 0.08,
      weight: 1,
      interactive: false
    }).addTo(map);
  } else {
    accuracyCircle.setLatLng(center);
    accuracyCircle.setRadius(a);
    accuracyCircle.setStyle({
      color: color,
      fillColor: color
    });
  }
}


/* =========================================================
   헤딩 / 회전
========================================================= */
function mapBearingForHeading() {
    return normalizeDeg(360 - finalHeading);
}

function applyHeadingBearingIfNeeded() {
  if (!headingUp || isUserInteracting()) return;
  if (typeof map.setBearing !== "function") return;

  const now = Date.now();
  if (now - lastBearingUpdateAt < BEARING_UPDATE_MS) return;

  const target = mapBearingForHeading();
  const diff = Math.abs(angleDiff(lastBearingApplied, target));

  if (diff < BEARING_MIN_DIFF) return;

  lastBearingUpdateAt = now;
  lastBearingApplied = target;

  map.setBearing(target);
}

function chooseHeading(speed) {
  if (compassHeading !== null && !isNaN(compassHeading)) {
    finalHeading = smoothAngle(finalHeading, compassHeading, COMPASS_SMOOTH);
    return "나침반";
  }

  if (gpsHeading !== null && !isNaN(gpsHeading)) {
    finalHeading = smoothAngle(finalHeading, gpsHeading, GPS_HEAD_SMOOTH);
    return "GPS";
  }

  return "대기";
}

/* =========================================================
   전체 업데이트
========================================================= */
function updateAll(pos, accuracy, speed, source) {
  if (!pos) return;

  updateBoat(pos);
  updateRangeRings(pos);
  updateHeadingCone(pos);
  updateTrail(pos);
  updateNearestPinDistance(pos);
  checkStopwatchPosition(pos);
  ensureAccuracyCircle(pos, accuracy);
  applyHeadingBearingIfNeeded();
  updateHUD(accuracy, speed, null);

  if (followBoat && !isUserInteracting()) {
    const now = Date.now();
    if (now - lastCenterUpdateAt > 350) {
      lastCenterUpdateAt = now;
      programmatic(() => {
        map.panTo(pos, { animate: true, duration: 0.25 });
      }, 300);
    }
  }
}

/* =========================================================
   나침반
========================================================= */
window.enableCompass = async function() {
  try {
    if (
      typeof DeviceOrientationEvent !== "undefined" &&
      typeof DeviceOrientationEvent.requestPermission === "function"
    ) {
      const result = await DeviceOrientationEvent.requestPermission();
      if (result !== "granted") {
        alert("나침반 권한이 거부되었습니다.");
        return;
      }
    }

    window.addEventListener("deviceorientationabsolute", onOrientation, true);
    window.addEventListener("deviceorientation", onOrientation, true);

    compassEnabled = true;
    updateButtons();
  } catch (e) {
    alert("나침반 권한 요청 실패: " + e.message);
  }
};

function onOrientation(e) {
  let h = null;

  if (e.webkitCompassHeading !== undefined && e.webkitCompassHeading !== null) {
    h = e.webkitCompassHeading;
  } else if (e.alpha !== null && e.alpha !== undefined) {
    h = 360 - e.alpha;
  }

  if (h === null || isNaN(h)) return;

  compassHeading = smoothAngle(compassHeading, normalizeDeg(h), COMPASS_SMOOTH);
  const source = chooseHeading(0);

  // 나침반 이벤트에서는 위치/거리링은 건드리지 않고,
  // 보트 아이콘 회전과 지도 헤딩만 즉시 갱신한다.
  updateBoatRotationOnly();
  applyHeadingBearingIfNeeded();
  updateHUD(null, 0, null);
}

/* =========================================================
   GPS
========================================================= */
function startGPS() {
  if (!navigator.geolocation) {
    alert("GPS를 지원하지 않는 브라우저입니다.");
    return;
  }

  navigator.geolocation.watchPosition(
    pos => {
      const now = Date.now();
      if (now - lastGpsAt < 700) return;
      lastGpsAt = now;

      const lat = pos.coords.latitude;
      const lng = pos.coords.longitude;
      const accuracy = pos.coords.accuracy;
      const speed = pos.coords.speed;
      const heading = pos.coords.heading;
      const altitude = pos.coords.altitude;

      if (accuracy && accuracy > MAX_GPS_ACCURACY_DROP) {
        return;
      }

      const raw = L.latLng(lat, lng);
      currentLatLng = raw;

      if (heading !== null && heading !== undefined && !isNaN(heading)) {
        gpsHeading = normalizeDeg(heading);
      }

      if (smoothedLatLng && smoothedLatLng.distanceTo(raw) < MIN_MOVE_METERS) {
        const source = chooseHeading(speed);
        updateAll(smoothedLatLng, accuracy, speed, source);
        calculateSpeed(smoothedLatLng || raw);
      updateHUD(accuracy, speed, altitude);
        return;
      }

      const factor = accuracy && accuracy > WEAK_GPS_ACCURACY
        ? POS_SMOOTH_WEAK
        : POS_SMOOTH_GOOD;

      smoothedLatLng = smoothLatLng(smoothedLatLng, raw, factor);

      const source = chooseHeading(speed);
      updateAll(smoothedLatLng, accuracy, speed, source);
      calculateSpeed(smoothedLatLng || raw);
      updateHUD(accuracy, speed, altitude);
    },
    err => {
      alert("GPS 오류. HTTPS 주소와 Safari 위치 권한을 확인하세요.");
    },
    {
      enableHighAccuracy: true,
      maximumAge: 30000,
      timeout: 15000
    }
  );
}

function addPinHere() {

  pinMode = true;

  alert("지도에서 원하는 위치를 터치하세요.");

}

function loadPins() {

  pinLayer.clearLayers();

/* =========================================================
   버튼
========================================================= */
window.goToMe = function() {
  if (!navigator.geolocation) {
    alert("위치 서비스를 지원하지 않습니다.");
    return;
  }

  navigator.geolocation.getCurrentPosition(
    pos => {
      const now = L.latLng(pos.coords.latitude, pos.coords.longitude);

      currentLatLng = now;
      smoothedLatLng = now;
      followBoat = true;

      if (pos.coords.heading !== null && pos.coords.heading !== undefined && !isNaN(pos.coords.heading)) {
        gpsHeading = normalizeDeg(pos.coords.heading);
      }

      const source = chooseHeading(pos.coords.speed);

      programmatic(() => {
        map.setView(now, Math.max(map.getZoom(), 19), { animate: true });
      }, 500);

      updateAll(now, pos.coords.accuracy, pos.coords.speed, source);
      updateHUD(pos.coords.accuracy, pos.coords.speed, pos.coords.altitude);
      updateButtons();
    },
    () => alert("현재 위치를 가져오지 못했습니다. 위치 권한을 확인하세요."),
    {
      enableHighAccuracy: true,
      timeout: 12000,
      maximumAge: 30000
    }
  );
};

window.toggleHeadingUp = function() {
  headingUp = !headingUp;
  if (headingUp) {
  followBoat = true;
    }
  if (!headingUp) {
    if (typeof map.setBearing === "function") {
      map.setBearing(0);
      lastBearingApplied = 0;
    }
  } else {
    if (!compassEnabled) {
      enableCompass();
    }
    applyHeadingBearingIfNeeded();
  }

  updateBoatRotationOnly();
  if (smoothedLatLng) updateAll(smoothedLatLng, null, 0, chooseHeading(0));
  updateButtons();
};

window.toggleFollow = function() {
  followBoat = !followBoat;

  if (followBoat && smoothedLatLng) {
    programmatic(() => {
      map.setView(smoothedLatLng, Math.max(map.getZoom(), 17), { animate: true });
    }, 400);
  }

  updateButtons();
};


/* =========================================================
   STOPWATCH
========================================================= */
let stopwatchRunning=false;
let stopwatchSeconds=0;
let stopwatchTimer=null;
let anchorPoint=null;
let alerted10min=false;

function updateStopwatchUI(){
 const el=document.getElementById('stopwatchDisplay');
 if(el){
  const m=Math.floor(stopwatchSeconds/60);
  const s=stopwatchSeconds%60;
  el.textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
 }
}

window.toggleStopwatch=function(){
 stopwatchRunning=!stopwatchRunning;

 if(stopwatchRunning){
   anchorPoint=smoothedLatLng||currentLatLng;

   stopwatchTimer=setInterval(()=>{
      stopwatchSeconds++;
      updateStopwatchUI();

      if(stopwatchSeconds>=600 && !alerted10min){
        alerted10min=true;
        try{
          const ctx=new(window.AudioContext||window.webkitAudioContext)();
          const osc=ctx.createOscillator();
          const gain=ctx.createGain();
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.frequency.value=880;
          osc.start();
          gain.gain.exponentialRampToValueAtTime(0.0001,ctx.currentTime+0.4);
          osc.stop(ctx.currentTime+0.4);
        }catch(e){}
        alert('30m 반경 내에서 10분 이상 체류 중입니다.');
      }
   },1000);

 }else{
   clearInterval(stopwatchTimer);
   stopwatchTimer=null;
 }
};

  let stopwatchPressTimer = null;

const stopwatchCard = document.getElementById("stopwatchCard");

if (stopwatchCard) {

  stopwatchCard.addEventListener("touchstart", () => {

    stopwatchPressTimer = setTimeout(() => {

      stopwatchRunning = false;

      clearInterval(stopwatchTimer);
      stopwatchTimer = null;

      stopwatchSeconds = 0;
      alerted10min = false;
      anchorPoint = null;

      updateStopwatchUI();

      alert("타이머가 초기화되었습니다.");

    }, 1200);

  });

  stopwatchCard.addEventListener("touchend", () => {
    clearTimeout(stopwatchPressTimer);
  });

  stopwatchCard.addEventListener("touchcancel", () => {
    clearTimeout(stopwatchPressTimer);
  });

}

function checkStopwatchPosition(pos){
 if(!stopwatchRunning||!anchorPoint||!pos) return;

 if(anchorPoint.distanceTo(pos)>30){
   anchorPoint=pos;
   stopwatchSeconds=0;
   alerted10min=false;
   updateStopwatchUI();
 }
}


function updateNearestPinDistance(pos){

 if(!pos) return;

 const pins=JSON.parse(localStorage.getItem("gosamPins")||"[]");
 const display=document.getElementById("pinDistanceDisplay");

 if(!pins.length){
   if(display) display.textContent="--";
   pinAlert30m=false;
   pinAlert10m=false;
   return;
 }

 let minDist=Infinity;

 pins.forEach(pin=>{
   const d=pos.distanceTo(L.latLng(pin.lat,pin.lng));
   if(d<minDist) minDist=d;
 });

 if(display) display.textContent=Math.round(minDist)+"m";

 if(minDist<=30 && !pinAlert30m){
   pinAlert30m=true;
   alert("📌 포인트 30m 접근");
 }

 if(minDist<=10 && !pinAlert10m){
   pinAlert10m=true;
   alert("📌 포인트 도착");
 }

 if(minDist>40){
   pinAlert30m=false;
   pinAlert10m=false;
 }
}



let measureMode=false;
let measurePoints=[];
let measureLine=null;
let measureStartMarker=null;
let measureEndMarker=null;
let measureLabel=null;

window.toggleMeasureMode=function(){
 measureMode=!measureMode;

 const btn=document.getElementById('measureBtn');
 if(btn) btn.classList.toggle('active',measureMode);

 if(!measureMode){

  measurePoints=[];

  if(measureLine) map.removeLayer(measureLine);
  if(measureStartMarker) map.removeLayer(measureStartMarker);
  if(measureEndMarker) map.removeLayer(measureEndMarker);
  if(measureLabel) map.removeLayer(measureLabel);

  measureLine=null;
  measureStartMarker=null;
  measureEndMarker=null;
  measureLabel=null;

  document.getElementById('measureDisplay').textContent='--';
}
};

map.on('click',function(e){

 if(!measureMode) return;

 measurePoints.push(e.latlng);

 if(measurePoints.length===1){
   document.getElementById('measureDisplay').textContent='START';
   return;
 }

if(measurePoints.length===2){

   const start=measurePoints[0];
   const end=measurePoints[1];

   const dist=Math.round(
      start.distanceTo(end)
   );

   document.getElementById('measureDisplay').textContent=
      dist+'m';

   if(measureLine) map.removeLayer(measureLine);
   if(measureStartMarker) map.removeLayer(measureStartMarker);
   if(measureEndMarker) map.removeLayer(measureEndMarker);
   if(measureLabel) map.removeLayer(measureLabel);

   measureLine=L.polyline([start,end],{
      color:'#40F7FF',
      weight:2,
      opacity:.9,
      dashArray:'6,6'
   }).addTo(map);

   measureStartMarker=L.marker(start,{
      icon:L.divIcon({
         className:'',
         html:`
           <div style="
             width:14px;
             height:14px;
             border-radius:50%;
             background:#40F7FF;
             box-shadow:0 0 14px #40F7FF;
             border:2px solid white;">
           </div>
         `,
         iconSize:[18,18],
         iconAnchor:[9,9]
      })
   }).addTo(map);

   measureEndMarker=L.marker(end,{
      icon:L.divIcon({
         className:'',
         html:`
           <div style="
             color:#40F7FF;
             font-size:22px;
             font-weight:900;
             text-shadow:0 0 12px #40F7FF;">
             ✚
           </div>
         `,
         iconSize:[22,22],
         iconAnchor:[11,11]
      })
   }).addTo(map);

   const center=L.latLng(
      (start.lat+end.lat)/2,
      (start.lng+end.lng)/2
   );

   measureLabel=L.marker(center,{
      icon:L.divIcon({
         className:'',
         html:`
           <div style="
             color:#40F7FF;
             font-size:13px;
             font-weight:800;
             text-shadow:
               0 0 10px #40F7FF,
               0 1px 4px rgba(0,0,0,.8);">
             ${dist}m
           </div>
         `,
         iconSize:[60,20],
         iconAnchor:[30,10]
      })
   }).addTo(map);

   measurePoints=[];
}
});

/* =========================================================
   시작
========================================================= */
createRangeRings();
createHeadingLine();
createHeadingCone();
createTrailLine();

// ✅ 저장된 핀 불러오기
loadPins();

startGPS();
updateButtons();
updateHUD(null, null, null);
</script>
