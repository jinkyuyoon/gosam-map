<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>고삼저수지 보트 GPS</title>
  <!-- Refactored CSS: duplicated style blocks consolidated into one stylesheet. -->

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Leaflet 지도 회전 플러그인 -->
  <script src="https://unpkg.com/leaflet-rotate@0.2.8/dist/leaflet-rotate-src.js"></script>

<style>
/* ==========================================================================
   01. THEME VARIABLES
   여기만 바꾸면 카드/버튼/팝업 색감이 같이 바뀜
========================================================================== */
:root{
  --app-bg: #071018;

  --accent: #40F7FF;
  --accent-soft: rgba(64,247,255,.28);
  --accent-glow: rgba(64,247,255,.45);

  --glass-bg: rgba(6,15,18,.82);
  --glass-bg-button: rgba(6,15,18,.58);
  --glass-bg-active: rgba(13,210,215,.20);

  --glass-border: rgba(255,255,255,.14);
  --glass-border-soft: rgba(255,255,255,.08);
  --glass-blur: 18px;

  --text-main: rgba(246,255,255,.96);
  --text-soft: rgba(255,255,255,.78);

  --shadow-card: 0 8px 24px rgba(0,0,0,.26);
  --shadow-button: 0 4px 12px rgba(0,0,0,.18);

  /* V4 Layout */
  --hud-size:72px;
  --hud-gap:8px;
  --hud-bottom:12px;
  --hud-radius:16px;
  --button-size:34px;
}

/* ==========================================================================
   02. RESET / BASE
========================================================================== */
html,
body{
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  overflow:hidden;
  background:var(--app-bg);
  font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;
  -webkit-user-select:none;
  user-select:none;
}

button{
  font:inherit;
  -webkit-tap-highlight-color:transparent;
}

/* ==========================================================================
   03. MAP
========================================================================== */
#map{
  width:100%;
  height:100dvh;
  background:var(--app-bg);
  filter:saturate(.85) contrast(1.15) brightness(1);
}

.leaflet-control-attribution,
.leaflet-control-container .leaflet-top.leaflet-left{
  display:none;
}

/* ==========================================================================
   04. COMMON GLASS UI
========================================================================== */
.hud-card,
.controls button,
.pin-delete-btn,
#pinHudCard{
  background:
    radial-gradient(circle at 28% 12%, rgba(255,255,255,.08), rgba(255,255,255,0) 38%),
    linear-gradient(180deg, rgba(255,255,255,.045), rgba(255,255,255,.012)),
    var(--glass-bg);
  border:1px solid var(--glass-border);
  backdrop-filter:blur(var(--glass-blur)) saturate(165%);
  -webkit-backdrop-filter:blur(var(--glass-blur)) saturate(165%);
  color:var(--text-main);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.16),
    var(--shadow-card);
}

/* ==========================================================================
   05. HUD CARDS
========================================================================== */
  .hud-stack{
  position:absolute;
  left:12px;
  bottom:calc(var(--hud-bottom) + env(safe-area-inset-bottom));
  z-index:1000;
  display:flex;
  flex-direction:column-reverse;
  gap:var(--hud-gap);
}
  
  .hud-card{
  pointer-events:none;
  width:var(--hud-size);
  border-radius:var(--hud-radius);
  padding:8px;
  box-sizing:border-box;
  text-align:center;
}

#stopwatchCard{
  pointer-events:auto;
  cursor:pointer;
}

.hud-label,
#stopwatchCard > div:first-child,
#measureCard > div:first-child,
#pinDistanceCard > div:first-child{
  font-size:9px;
  line-height:1;
  font-weight:800;
  opacity:.82;
  letter-spacing:.2px;
  margin-bottom:4px;
}

.hud-value,
#stopwatchDisplay,
#measureDisplay,
#pinDistanceDisplay{
  color:var(--accent) !important;
  font-size:14px !important;
  line-height:1 !important;
  font-weight:800 !important;
  text-shadow:0 0 12px var(--accent-soft);
}

/* 속도 카드 */
#dataCard{
  width:var(--hud-size);
  height:var(--hud-size);
  padding:0;
  border-radius:var(--hud-radius);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

#dataCard .data-block{
  width:100%;
  margin:0;
  padding:0;
  border-bottom:0;
}

#dataCard .data-label{
  margin:0 0 4px;
  color:var(--text-soft);
  font-size:calc(var(--hud-size) * .12);
  line-height:1;
  font-weight:800;
  letter-spacing:.2px;
}

#dataCard .data-value{
  display:inline-block;
  color:var(--accent);
  font-size:calc(var(--hud-size) * .42);
  font-weight:900;
  line-height:.92;
  letter-spacing:-1.4px;
  text-shadow:0 0 16px var(--accent-soft);
}

#dataCard .data-unit{
  display:block;
  margin:3px 0 0;
  color:var(--text-soft);
  font-size:calc(var(--hud-size) * .14);
  line-height:1;
  font-weight:700;
  opacity:.72;
}

#dataCard .data-sub{
  display:none;
}

/* ==========================================================================
   06. CONTROLS / BUTTONS
========================================================================== */
.controls{
  position:absolute;
  right:18px;
  bottom:calc(12px + env(safe-area-inset-bottom));
  top:auto;
  z-index:1001;
  display:flex;
  flex-direction:column;
  gap:8px;
  pointer-events:none;
}

.controls button{
  pointer-events:auto;
  width:var(--button-size);
  height:var(--button-size);
  min-width:var(--button-size);
  min-height:var(--button-size);
  padding:0;
  border-radius:12px;
  background:
    radial-gradient(circle at 30% 18%, rgba(255,255,255,.10), rgba(255,255,255,0) 35%),
    linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.018)),
    var(--glass-bg-button);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.13),
    var(--shadow-button);
  display:flex;
  align-items:center;
  justify-content:center;
  color:var(--text-main);
}

.controls button.active{
  background:
    radial-gradient(circle at 30% 18%, rgba(255,255,255,.30), rgba(255,255,255,0) 30%),
    radial-gradient(circle at 50% 50%, rgba(110,255,255,.16), rgba(110,255,255,0) 70%),
    linear-gradient(180deg, rgba(125,255,255,.24), rgba(0,200,215,.24)),
    var(--glass-bg-active);
  border-color:rgba(170,255,255,.45);
  color:#F8FFFF;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.25),
    0 0 10px rgba(64,247,255,.22),
    0 0 20px rgba(64,247,255,.14);
}

.control-icon,
.controls button svg{
  width:18px;
  height:18px;
  display:block;
  stroke:currentColor;
  fill:none;
  stroke-width:2.6;
  stroke-linecap:round;
  stroke-linejoin:round;
  filter:drop-shadow(0 0 8px rgba(255,255,255,.10));
}

.control-icon.fill{
  fill:currentColor;
  stroke:none;
}

.controls button.active .control-icon{
  filter:
    drop-shadow(0 0 6px rgba(255,255,255,.9))
    drop-shadow(0 0 14px rgba(64,247,255,.95));
}

/* ==========================================================================
   07. MAP OBJECTS / LABELS
========================================================================== */
.boat-wrap{
  width:33px;
  height:33px;
  transform-origin:50% 50%;
  will-change:transform;
}

.ring-label{
  color:#EFFFFF;
  font-size:10px;
  font-weight:800;
  letter-spacing:.1px;
  background:transparent;
  border:none;
  box-shadow:none;
  text-shadow:
    0 0 2px rgba(0,0,0,.9),
    0 0 4px rgba(0,0,0,.8),
    0 0 6px rgba(64,247,255,.2);
  white-space:nowrap;
}

.heading-label,
.accuracy-label,
#scaleBar{
  display:none;
}

/* ==========================================================================
   08. PIN MODAL / POPUP
========================================================================== */
#pinHudCard{
  display:none;
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  z-index:5000;
  width:320px;
  max-width:85vw;
  padding:18px;
  border-radius:24px;
  box-sizing:border-box;
  box-shadow:
    0 0 30px rgba(64,247,255,.12),
    0 20px 60px rgba(0,0,0,.50);
}

#pinHudTitle{
  color:var(--accent) !important;
}

#pinHudDistance{
  color:var(--accent) !important;
}

.pin-delete-btn{
  pointer-events:auto;
  width:auto;
  height:42px;
  border-radius:12px;
  padding:8px 10px;
  font-size:14px;
  font-weight:800;
}

.leaflet-popup-content{
  margin:12px;
}

.leaflet-popup-content-wrapper{
  border-radius:18px;
  background:var(--glass-bg);
  color:var(--text-main);
  backdrop-filter:blur(var(--glass-blur));
  -webkit-backdrop-filter:blur(var(--glass-blur));
}

.leaflet-popup-tip{
  background:var(--glass-bg);
}

/* ==========================================================================
   09. RESPONSIVE
========================================================================== */
@media (max-width:430px){
  .controls{
    right:18px;
    bottom:calc(12px + env(safe-area-inset-bottom));
    gap:8px;
  }

  .controls button{
    width:34px;
    height:34px;
    min-width:34px;
    min-height:34px;
    border-radius:12px;
  }

  .control-icon,
  .controls button svg{
    width:18px;
    height:18px;
  }

  .hud-card{
    width:72px;
    border-radius:16px;
    padding:7px 8px;
  }

  #dataCard{
    width:72px;
    min-height:64px;
    padding:8px 8px 7px;
  }

  #dataCard .data-value{
    font-size:30px;
  }

  #dataCard .data-unit{
    font-size:10px;
  }

  .boat-wrap{
    width:33px;
    height:33px;
  }
}
</style>

</head>

<body>
<div id="map"></div>

<div class="hud-stack">
<div id="stopwatchCard" class="hud-card" onclick="toggleStopwatch()">
<div class="hud-label">TIMER</div>
<div id="stopwatchDisplay" class="hud-value">00:00</div>
</div>


<div id="measureCard" class="hud-card">
<div class="hud-label">RANGE</div>
<div id="measureDisplay" class="hud-value">--</div>
</div>

<div id="pinDistanceCard" class="hud-card">
<div class="hud-label">PIN</div>
<div id="pinDistanceDisplay" class="hud-value">--</div>
</div>

<div id="dataCard" class="hud-card">
  <div class="data-block">
    <div class="data-label">SPEED</div>
    <div><span id="hudSpeed" class="data-value">--</span><span class="data-unit">km/h</span>
    </div>
  </div>
 </div>
</div> 



<div class="controls">
  <button id="locBtn" onclick="goToMe()" aria-label="내 위치" title="내 위치">
    <svg class="control-icon" viewBox="0 0 32 32"><path d="M16 3v5M16 24v5M3 16h5M24 16h5"/><circle cx="16" cy="16" r="7"/><circle cx="16" cy="16" r="2.3" fill="currentColor" stroke="none"/></svg>
    
  </button>
  <button id="headingBtn" class="dark" onclick="toggleHeadingUp()" aria-label="헤딩업" title="헤딩업">
    <svg class="control-icon fill" viewBox="0 0 32 32"><path d="M16 4l11 24-11-6-11 6z"/></svg>
    
  </button>
  <button id="measureBtn" onclick="toggleMeasureMode()" title="거리 측정">
    <svg class="control-icon" viewBox="0 0 32 32">
      <path d="M6 22 L26 10"/>
      <path d="M9 20 L11 23 M14 17 L16 20 M19 14 L21 17 M24 11 L26 14"/>
    </svg>
  </button>
  <button id="pinBtn" onclick="addPinHere()" title="핀 추가">
    <svg class="control-icon" viewBox="0 0 32 32"><path d="M16 6v20M6 16h20"/></svg>
    
  </button>
</div>


<div id="pinHudCard">
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
<div id="pinHudTitle" style="font-size:24px;font-weight:800;color:#40F7FF"></div>
<div onclick="hidePinHud()" style="cursor:pointer;font-size:28px;color:#40F7FF">×</div>
</div>
<div id="pinHudDate" style="opacity:.7;margin-bottom:10px"></div>
<div id="pinHudDistance" style="font-size:18px;color:#40F7FF;margin-bottom:12px"></div>
<div id="pinHudMemo" style="white-space:pre-wrap;border:1px solid rgba(64,247,255,.18);padding:12px;border-radius:12px;margin-bottom:14px"></div>
<div style="display:flex;gap:10px">
<button class="pin-delete-btn" style="flex:1;width:auto;height:42px;font-size:14px;" onclick="editPin(window.currentPinIndex)">✏ 수정</button>
<button class="pin-delete-btn" style="flex:1;width:auto;height:42px;font-size:14px;" onclick="deletePin(window.currentPinIndex)">🗑 삭제</button>
</div>
</div>

<script>
/* =========================================================
   설정
========================================================= */
const IMAGE_URL = "gosam-low-water-optimized.jpg";

const INITIAL_CENTER = [37.082, 127.283];
const INITIAL_ZOOM = 18;

// Leaflet bounds: [[south, west], [north, east]]
const IMAGE_BOUNDS = [
  [37.07270, 127.269358],
  [37.09483, 127.297100]
];

const RING_METERS = [5,10,20,30,40,50];

const MAX_GPS_ACCURACY_DROP = 80;
const WEAK_GPS_ACCURACY = 25;
const MIN_MOVE_METERS = 2.5;

const POS_SMOOTH_GOOD = 0.20;
const POS_SMOOTH_WEAK = 0.12;
const COMPASS_SMOOTH = 0.20;
const GPS_HEAD_SMOOTH = 0.16;

// 회전 안정화
const BEARING_UPDATE_MS = 40;
const BEARING_MIN_DIFF = 2;

/* =========================================================
   지도 생성
========================================================= */
const map = L.map("map", {
  center: INITIAL_CENTER,
  zoom: INITIAL_ZOOM,
  zoomControl: false,
  attributionControl: false,
  rotate: true,
  touchRotate: false,
  bearing: 0,
  inertia: true,
  preferCanvas: true
});

L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", {
  maxZoom: 19,
  crossOrigin: true
}).addTo(map);

L.imageOverlay(IMAGE_URL, IMAGE_BOUNDS, {
  opacity: 0.92,
  interactive: false
}).addTo(map);

/* =========================================================
   상태
========================================================= */
const headingBtn = document.getElementById("headingBtn");

const hudSpeed = document.getElementById("hudSpeed");
const hudHeading = document.getElementById("hudHeading");
const hudDir = document.getElementById("hudDir");


let headingUp = false;
let followBoat = false; // starts disabled
let compassEnabled = false;

let currentLatLng = null;
let smoothedLatLng = null;

let pinMode = false;

let compassHeading = null;
let gpsHeading = null;
let finalHeading = 0;

let boatMarker = null;
let boatWrapEl = null;
let lastGpsAt = 0;
let lastCenterUpdateAt = 0;
let lastBearingUpdateAt = 0;
let lastBearingApplied = 0;

let userInteractingUntil = 0;
let lastSpeedCalcPos = null;
let lastSpeedCalcTime = null;
let calculatedSpeedKmh = 0;
let lastAccuracy = null;

/* =========================================================
   사용자 조작 감지
========================================================= */
function markUserInteracting() {
  userInteractingUntil = Date.now() + 700;
}

["dragstart", "zoomstart", "movestart"].forEach(ev => {
  map.on(ev, () => {
    if (!map._programmaticMove) {
      markUserInteracting();

      followBoat = false;
      headingUp = false;

      if (typeof map.setBearing === "function") {
        map.setBearing(0);
      }

      updateButtons();
    }
  });
});

function isUserInteracting() {
  return Date.now() < userInteractingUntil;
}

function programmatic(fn, duration = 300) {
  map._programmaticMove = true;
  fn();
  setTimeout(() => { map._programmaticMove = false; }, duration);
}

  map.on("click", function(e) {

  if (!pinMode) return;

  pinMode = false;

  if (!confirm("여기에 핀을 추가하시겠습니까?")) {
    return;
  }

  const pins = JSON.parse(localStorage.getItem("gosamPins") || "[]");

  pins.push({
    lat: e.latlng.lat,
    lng: e.latlng.lng,
    name: "Point " + (pins.length + 1),
    createdAt: Date.now()
  });

  localStorage.setItem(
    "gosamPins",
    JSON.stringify(pins)
  );

  loadPins();

});
/* =========================================================
   유틸
========================================================= */
function normalizeDeg(d) {
  d = d % 360;
  return d < 0 ? d + 360 : d;
}

function angleDiff(from, to) {
  return ((to - from + 540) % 360) - 180;
}

function smoothAngle(prev, next, factor) {
  if (prev === null || prev === undefined || isNaN(prev)) return normalizeDeg(next);
  return normalizeDeg(prev + angleDiff(prev, next) * factor);
}

function smoothLatLng(prev, next, factor) {
  if (!prev) return next;
  return L.latLng(
    prev.lat + (next.lat - prev.lat) * factor,
    prev.lng + (next.lng - prev.lng) * factor
  );
}



function destinationPoint(center, meters, bearingDeg) {
  const R = 6371000;
  const brng = bearingDeg * Math.PI / 180;
  const lat1 = center.lat * Math.PI / 180;
  const lng1 = center.lng * Math.PI / 180;

  const lat2 = Math.asin(
    Math.sin(lat1) * Math.cos(meters / R) +
    Math.cos(lat1) * Math.sin(meters / R) * Math.cos(brng)
  );

  const lng2 = lng1 + Math.atan2(
    Math.sin(brng) * Math.sin(meters / R) * Math.cos(lat1),
    Math.cos(meters / R) - Math.sin(lat1) * Math.sin(lat2)
  );

  return L.latLng(lat2 * 180 / Math.PI, lng2 * 180 / Math.PI);
}


function headingToDir(deg) {
  if (deg === null || deg === undefined || isNaN(deg)) return "";
  const dirs = ["N","NE","E","SE","S","SW","W","NW"];
  return dirs[Math.round(normalizeDeg(deg) / 45) % 8];
}

function updateHUD(accuracy, speed, altitude) {
  if (accuracy !== null && accuracy !== undefined && !isNaN(accuracy)) {
    lastAccuracy = accuracy;
  }


  if (hudSpeed) {
    hudSpeed.textContent = calculatedSpeedKmh.toFixed(1);
  }

  if (hudHeading) {
    hudHeading.textContent = Math.round(normalizeDeg(finalHeading)) + "°";
  }

  if (hudDir) {
    hudDir.textContent = headingToDir(finalHeading);
  }
}



function calculateSpeed(latlng) {
  const now = Date.now();

  if (!lastSpeedCalcPos) {
    lastSpeedCalcPos = latlng;
    lastSpeedCalcTime = now;
    return calculatedSpeedKmh;
  }

  const dist = lastSpeedCalcPos.distanceTo(latlng);
  const sec = (now - lastSpeedCalcTime) / 1000;

  if (sec > 0.8) {
    calculatedSpeedKmh = (dist / sec) * 3.6;
    lastSpeedCalcPos = latlng;
    lastSpeedCalcTime = now;
  }

  return calculatedSpeedKmh;
}

function updateButtons() {
  headingBtn.classList.toggle("active", headingUp);
  updateHUD(null, null, null);
}

/* =========================================================
   보트 아이콘
========================================================= */
function boatSvg(size = 33) {
  return `
  <svg width="${size}" height="${size}" viewBox="0 0 84 84">
    <defs>
      <linearGradient id="hullGrad${size}" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#FFFFFF"/>
        <stop offset="46%" stop-color="#AFFFFF"/>
        <stop offset="100%" stop-color="#1BE5EA"/>
      </linearGradient>
      <filter id="boatGlow${size}" x="-45%" y="-45%" width="190%" height="190%">
        <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#44F7FF" flood-opacity=".82"/>
        <feDropShadow dx="0" dy="8" stdDeviation="4.6" flood-color="#000000" flood-opacity=".5"/>
      </filter>
    </defs>

    <g filter="url(#boatGlow${size})">
    
     <path d="M42 5
               C55 19 65 41 60 68
               C56 76 28 76 24 68
               C19 41 29 19 42 5 Z"
            fill="url(#hullGrad${size})"
            stroke="rgba(255,255,255,.97)"
            stroke-width="3.4"
            stroke-linejoin="round"/>

      <path d="M42 15
               C49 29 52 45 49 64
               C46 69 38 69 35 64
               C32 45 35 29 42 15 Z"
            fill="rgba(0,23,29,.45)"/>

      <path d="M42 8 L55 31 L42 24 L29 31 Z"
            fill="#FFFFFF"
            opacity=".98"/>

      <path d="M31 60 C36 65 48 65 53 60"
            fill="none"
            stroke="rgba(255,255,255,.70)"
            stroke-width="2.2"
            stroke-linecap="round"/>
    </g>
  </svg>`;
}

function createBoatIcon(rotation) {
  return L.divIcon({
    className: "",
    html: `<div id="boatWrap" class="boat-wrap" style="transform: rotate(${rotation}deg);">${boatSvg(33)}</div>`,
    iconSize: [33, 33],
    iconAnchor: [17, 17]
  });
}

function getBoatRotation() {
  // 헤딩업 ON: 지도 자체가 회전하므로 보트는 화면 위쪽 고정
  // 헤딩업 OFF: 보트 아이콘이 나침반/방향값을 따라 회전
  return headingUp ? 0 : finalHeading;
}

function updateBoatRotationOnly() {
  if (!boatWrapEl) {
    boatWrapEl = document.getElementById("boatWrap");
  }
  if (!boatWrapEl) return;

  boatWrapEl.style.transform = `rotate(${normalizeDeg(getBoatRotation())}deg)`;
}

function updateBoat(pos) {
  if (!boatMarker) {
    boatMarker = L.marker(pos, {
      icon: createBoatIcon(getBoatRotation()),
      interactive: false
    }).addTo(map);

    boatWrapEl = document.getElementById("boatWrap");
  } else {
    boatMarker.setLatLng(pos);
  }

  // 중요: GPS 이벤트에서는 위치만 갱신하고, 아이콘 재생성은 하지 않는다.
  // 회전은 나침반 이벤트에서 CSS transform으로 즉시 갱신한다.
  updateBoatRotationOnly();
}

/* =========================================================
   거리 링 / 진행선
========================================================= */
const ringLayer = L.layerGroup().addTo(map);
const labelLayer = L.layerGroup().addTo(map);
let accuracyCircle = null;
let headingCone = [];
let trailLine = null;
let trailPoints = [];
let nearestPinDistance=null;
let pinAlert30m=false;
let pinAlert10m=false;

let pinLayer = L.layerGroup().addTo(map);  
  
const ringCircles = {};
const ringLabels = {};
  
function createRangeRings() {

  RING_METERS.forEach(r => {
   const shadowCircle = L.circle(INITIAL_CENTER, {
    renderer: L.svg(),
     
    radius: r + 0.45,
    color: "#000000",
    weight: 3.6,
    opacity: 0.45,
    fillOpacity: 0,
    dashArray: "2,6",
    lineCap: "round",
    interactive: false
  }).addTo(ringLayer);
    
    const circle = L.circle(INITIAL_CENTER, {
    renderer: L.svg(),
      
      radius: r,
      color: "#8FFFFF",
      weight: 1,
      opacity:
        r >= 50 ? 0.75 :
        r >= 40 ? 0.38 :
        r >= 30 ? 0.75 :
        r >= 20 ? 0.38 :
        r >= 10 ? 0.75 :
        0.75,
      fillOpacity: 0,
      dashArray: "1,5",
      lineCap: "round",
      interactive: false
    }).addTo(ringLayer);
    
    ringCircles["shadow_" + r] = shadowCircle;
    ringCircles[r] = circle;

    if (r !== 5) {
      const label = L.marker(INITIAL_CENTER, {
        icon: L.divIcon({
          className: "ring-label",
          html: `${r}m`,
          iconSize: [30,14],
          iconAnchor: [15,7]
        }),
        interactive:false
      }).addTo(labelLayer);

      ringLabels[r] = label;
    }

  });

}
function updateRangeRings(center) {
  if (Object.keys(ringCircles).length === 0) {
    createRangeRings();
  }

  RING_METERS.forEach(r => {
    if (ringCircles["shadow_" + r]) {
  ringCircles["shadow_" + r].setLatLng(center);
}
    ringCircles[r].setLatLng(center);
        
    if (ringLabels[r]) {
      ringLabels[r].setLatLng(
        destinationPoint(center, r + 3, headingUp ? finalHeading : 0)
      );
    }
  });
}



let radarCanvas=null;
let radarAngle=0;
let radarCenter=null;

function createRadarSweep(){
 if(radarCanvas) return;

 radarCanvas=document.createElement('div');
 radarCanvas.id='garminRadar';
 radarCanvas.style.position='absolute';
 radarCanvas.style.width='650px';
 radarCanvas.style.height='650px';

function updateRadarSweep(center){
 radarCenter=center;
}

function createTrailLine() {
  trailLine = L.polyline([], {
    color: "rgba(255,255,255,.44)",
    weight: 1.3,
    opacity: 0.62,
    dashArray: "1,9",
    lineCap: "round",
    interactive: false
  }).addTo(map);
}

function updateTrail(pos) {
  if (!trailLine || !pos) return;

  const last = trailPoints[trailPoints.length - 1];
  if (!last || last.distanceTo(pos) > 1.8) {
    trailPoints.push(pos);
  }

  if (trailPoints.length > 28) {
    trailPoints.shift();
  }

  trailLine.setLatLngs(trailPoints);
}



function ensureAccuracyCircle(center, accuracy){
  const a = Math.max(1, accuracy || 1);

  // 정확도 5m 이하면 숨김
  if (a <= 3) {
    if (accuracyCircle) {
      map.removeLayer(accuracyCircle);
      accuracyCircle = null;
    }
    return;
  }

  let color = "rgba(255,179,71,.72)";

  if (!accuracyCircle) {
    accuracyCircle = L.circle(center, {
      radius: a,
      color: color,
      fillColor: color,
      fillOpacity: 0.08,
      weight: 1,
      interactive: false
    }).addTo(map);
  } else {
    accuracyCircle.setLatLng(center);
    accuracyCircle.setRadius(a);
    accuracyCircle.setStyle({
      color: color,
      fillColor: color
    });
  }
}


/* =========================================================
   헤딩 / 회전
========================================================= */
function mapBearingForHeading() {
    return normalizeDeg(360 - finalHeading);
}

function applyHeadingBearingIfNeeded() {
  if (!headingUp || isUserInteracting()) return;
  if (typeof map.setBearing !== "function") return;

  const now = Date.now();
  if (now - lastBearingUpdateAt < BEARING_UPDATE_MS) return;

  const target = mapBearingForHeading();
  const diff = Math.abs(angleDiff(lastBearingApplied, target));

  if (diff < BEARING_MIN_DIFF) return;

  lastBearingUpdateAt = now;
  lastBearingApplied = target;

  map.setBearing(target);
}

function chooseHeading(speed) {
  if (compassHeading !== null && !isNaN(compassHeading)) {
    finalHeading = smoothAngle(finalHeading, compassHeading, COMPASS_SMOOTH);
    return "나침반";
  }

  if (gpsHeading !== null && !isNaN(gpsHeading)) {
    finalHeading = smoothAngle(finalHeading, gpsHeading, GPS_HEAD_SMOOTH);
    return "GPS";
  }

  return "대기";
}

/* =========================================================
   전체 업데이트
========================================================= */
function updateAll(pos, accuracy, speed, source) {
  if (!pos) return;

  updateBoat(pos);
  updateRangeRings(pos);
  updateRadarSweep(pos);
  updateTrail(pos);
  updateNearestPinDistance(pos);
  checkStopwatchPosition(pos);
  ensureAccuracyCircle(pos, accuracy);
  applyHeadingBearingIfNeeded();

  if (followBoat && !isUserInteracting()) {
    const now = Date.now();
    if (now - lastCenterUpdateAt > 350) {
      lastCenterUpdateAt = now;
      programmatic(() => {
        map.panTo(pos, { animate: true, duration: 0.25 });
      }, 300);
    }
  }
}

/* =========================================================
   나침반
========================================================= */
window.enableCompass = async function() {
  try {
    if (
      typeof DeviceOrientationEvent !== "undefined" &&
      typeof DeviceOrientationEvent.requestPermission === "function"
    ) {
      const result = await DeviceOrientationEvent.requestPermission();
      if (result !== "granted") {
        alert("나침반 권한이 거부되었습니다.");
        return;
      }
    }

    window.addEventListener("deviceorientationabsolute", onOrientation, true);
    window.addEventListener("deviceorientation", onOrientation, true);

    compassEnabled = true;
    updateButtons();
  } catch (e) {
    alert("나침반 권한 요청 실패: " + e.message);
  }
};

function onOrientation(e) {
  let h = null;

  if (e.webkitCompassHeading !== undefined && e.webkitCompassHeading !== null) {
    h = e.webkitCompassHeading;
  } else if (e.alpha !== null && e.alpha !== undefined) {
    h = 360 - e.alpha;
  }

  if (h === null || isNaN(h)) return;

  compassHeading = smoothAngle(compassHeading, normalizeDeg(h), COMPASS_SMOOTH);
  const source = chooseHeading(0);

  // 나침반 이벤트에서는 위치/거리링은 건드리지 않고,
  // 보트 아이콘 회전과 지도 헤딩만 즉시 갱신한다.
  updateBoatRotationOnly();
  applyHeadingBearingIfNeeded();
  updateHUD(null, 0, null);
}

/* =========================================================
   GPS
========================================================= */
function startGPS() {
  if (!navigator.geolocation) {
    alert("GPS를 지원하지 않는 브라우저입니다.");
    return;
  }
  
  
  navigator.geolocation.watchPosition(
    pos => {
      const now = Date.now();
      if (now - lastGpsAt < 700) return;
      lastGpsAt = now;

      const lat = pos.coords.latitude;
      const lng = pos.coords.longitude;
      const accuracy = pos.coords.accuracy;
      const speed = pos.coords.speed;
      const heading = pos.coords.heading;
      const altitude = pos.coords.altitude;

      if (accuracy && accuracy > MAX_GPS_ACCURACY_DROP) {
        return;
      }

      const raw = L.latLng(lat, lng);
      currentLatLng = raw;

      if (heading !== null && heading !== undefined && !isNaN(heading)) {
        gpsHeading = normalizeDeg(heading);
      }

      if (smoothedLatLng && smoothedLatLng.distanceTo(raw) < MIN_MOVE_METERS) {
        const source = chooseHeading(speed);
        calculateSpeed(smoothedLatLng || raw);
        updateAll(smoothedLatLng, accuracy, speed, source);
        updateHUD(accuracy, speed, altitude);
        return;
      }

      const factor = accuracy && accuracy > WEAK_GPS_ACCURACY
        ? POS_SMOOTH_WEAK
        : POS_SMOOTH_GOOD;

      smoothedLatLng = smoothLatLng(smoothedLatLng, raw, factor);

      const source = chooseHeading(speed);
      calculateSpeed(smoothedLatLng || raw);
      updateAll(smoothedLatLng, accuracy, speed, source);
      updateHUD(accuracy, speed, altitude);
    },
    err => {
      console.log("GPS:", err);
    },
    {
      enableHighAccuracy: true,
      maximumAge: 30000,
      timeout: 15000
    }
  );
}

/* =========================================================
   버튼
========================================================= */
window.goToMe = function() {
  if (!navigator.geolocation) {
    alert("위치 서비스를 지원하지 않습니다.");
    return;
  }

  navigator.geolocation.getCurrentPosition(
    pos => {
      const now = L.latLng(pos.coords.latitude, pos.coords.longitude);

      currentLatLng = now;
      smoothedLatLng = now;
      followBoat = true;

      if (pos.coords.heading !== null && pos.coords.heading !== undefined && !isNaN(pos.coords.heading)) {
        gpsHeading = normalizeDeg(pos.coords.heading);
      }

      const source = chooseHeading(pos.coords.speed);

      programmatic(() => {
        map.setView(now, map.getZoom(), { animate: true });
      }, 500);

      updateAll(now, pos.coords.accuracy, pos.coords.speed, source);
      updateHUD(pos.coords.accuracy, pos.coords.speed, pos.coords.altitude);
      updateButtons();
    },
    () => alert("현재 위치를 가져오지 못했습니다. 위치 권한을 확인하세요."),
    {
      enableHighAccuracy: true,
      timeout: 12000,
      maximumAge: 30000
    }
  );
};

window.toggleHeadingUp = function() {
  headingUp = !headingUp;
  if (headingUp) {
  followBoat = true;
    }
  if (!headingUp) {
    if (typeof map.setBearing === "function") {
      map.setBearing(0);
      lastBearingApplied = 0;
    }
  } else {
    if (!compassEnabled) {
      enableCompass();
    }
    applyHeadingBearingIfNeeded();
  }

  updateBoatRotationOnly();
  if (smoothedLatLng) updateAll(smoothedLatLng, null, 0, chooseHeading(0));
  updateButtons();
};



/* =========================================================
   STOPWATCH
========================================================= */
let stopwatchRunning=false;
let stopwatchSeconds=0;
let stopwatchTimer=null;
let anchorPoint=null;
let alerted10min=false;

function updateStopwatchUI(){
 const el=document.getElementById('stopwatchDisplay');
 if(el){
  const m=Math.floor(stopwatchSeconds/60);
  const s=stopwatchSeconds%60;
  el.textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
 }
}

window.toggleStopwatch=function(){
 stopwatchRunning=!stopwatchRunning;

 if(stopwatchRunning){
   anchorPoint=smoothedLatLng||currentLatLng;

   stopwatchTimer=setInterval(()=>{
      stopwatchSeconds++;
      updateStopwatchUI();

      if(stopwatchSeconds>=600 && !alerted10min){
        alerted10min=true;
        try{
          const ctx=new(window.AudioContext||window.webkitAudioContext)();
          const osc=ctx.createOscillator();
          const gain=ctx.createGain();
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.frequency.value=880;
          osc.start();
          gain.gain.exponentialRampToValueAtTime(0.0001,ctx.currentTime+0.4);
          osc.stop(ctx.currentTime+0.4);
        }catch(e){}
        alert('30m 반경 내에서 10분 이상 체류 중입니다.');
      }
   },1000);

 }else{
   clearInterval(stopwatchTimer);
   stopwatchTimer=null;
 }
};

  let stopwatchPressTimer = null;

const stopwatchCard = document.getElementById("stopwatchCard");

if (stopwatchCard) {

  stopwatchCard.addEventListener("touchstart", () => {

    stopwatchPressTimer = setTimeout(() => {

      stopwatchRunning = false;

      clearInterval(stopwatchTimer);
      stopwatchTimer = null;

      stopwatchSeconds = 0;
      alerted10min = false;
      anchorPoint = null;

      updateStopwatchUI();

      alert("타이머가 초기화되었습니다.");

    }, 1200);

  });

  stopwatchCard.addEventListener("touchend", () => {
    clearTimeout(stopwatchPressTimer);
  });

  stopwatchCard.addEventListener("touchcancel", () => {
    clearTimeout(stopwatchPressTimer);
  });

}

function checkStopwatchPosition(pos){
 if(!stopwatchRunning||!anchorPoint||!pos) return;

 if(anchorPoint.distanceTo(pos)>30){
   anchorPoint=pos;
   stopwatchSeconds=0;
   alerted10min=false;
   updateStopwatchUI();
 }
}


function updateNearestPinDistance(pos){

 if(!pos) return;

 const pins=JSON.parse(localStorage.getItem("gosamPins")||"[]");
 const display=document.getElementById("pinDistanceDisplay");

 if(!pins.length){
   if(display) display.textContent="--";
   pinAlert30m=false;
   pinAlert10m=false;
   return;
 }

 let minDist=Infinity;

 pins.forEach(pin=>{
   const d=pos.distanceTo(L.latLng(pin.lat,pin.lng));
   if(d<minDist) minDist=d;
 });

 if(display) display.textContent=Math.round(minDist)+"m";

 if(minDist<=30 && !pinAlert30m){
   pinAlert30m=true;
   alert("📌 포인트 30m 접근");
 }

 if(minDist<=10 && !pinAlert10m){
   pinAlert10m=true;
   alert("📌 포인트 도착");
 }

 if(minDist>40){
   pinAlert30m=false;
   pinAlert10m=false;
 }
}



let measureMode=false;
let measurePoints=[];
let measureLine=null;
let measureStartMarker=null;
let measureEndMarker=null;
let measureLabel=null;

window.toggleMeasureMode=function(){
 measureMode=!measureMode;

 const btn=document.getElementById('measureBtn');
 if(btn) btn.classList.toggle('active',measureMode);

 if(!measureMode){

  measurePoints=[];

  if(measureLine) map.removeLayer(measureLine);
  if(measureStartMarker) map.removeLayer(measureStartMarker);
  if(measureEndMarker) map.removeLayer(measureEndMarker);
  if(measureLabel) map.removeLayer(measureLabel);

  measureLine=null;
  measureStartMarker=null;
  measureEndMarker=null;
  measureLabel=null;

  document.getElementById('measureDisplay').textContent='--';
}
};

 if(!measureMode) return;

 measurePoints.push(e.latlng);

 if(measurePoints.length===1){

 }

if(measurePoints.length===2){

   const start=measurePoints[0];

   measureLine=L.polyline([start,end],{

      weight:2,
      opacity:.9,

   }).addTo(map);

   measureStartMarker=L.marker(start,{
      icon:L.divIcon({
         className:'',
         html:`
           <div style="
             width:14px;
             height:14px;
             border-radius:50%;
             background:#40F7FF;
             box-shadow:0 0 14px #40F7FF;
             border:2px solid white;">
           </div>
         `,
         iconSize:[18,18],
         iconAnchor:[9,9]
      })
   }).addTo(map);

   measureEndMarker=L.marker(end,{
      icon:L.divIcon({
         className:'',
         html:`
           <div style="
             color:#40F7FF;
             font-size:22px;
             font-weight:900;
             text-shadow:0 0 12px #40F7FF;">
             ✚
           </div>
         `,
         iconSize:[22,22],
         iconAnchor:[11,11]
      })
   }).addTo(map);

   const center=L.latLng(
      (start.lat+end.lat)/2,
      (start.lng+end.lng)/2
   );

   measureLabel=L.marker(center,{
      icon:L.divIcon({
         className:'',
         html:`
           <div style="
             color:#40F7FF;
             font-size:13px;
             font-weight:800;
             text-shadow:
               0 0 10px #40F7FF,
               0 1px 4px rgba(0,0,0,.8);">
             ${dist}m
           </div>
         `,
         iconSize:[60,20],
         iconAnchor:[30,10]
      })
   }).addTo(map);

   measurePoints=[];
}
});

/* =========================================================
   시작
========================================================= */
createRadarSweep();
createTrailLine();

// ✅ 저장된 핀 불러오기
loadPins();

startGPS();
updateButtons();
updateHUD(null, null, null);
