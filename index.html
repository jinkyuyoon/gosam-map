<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>고삼저수지 보트 GPS</title>

  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #111;
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      -webkit-user-select: none;
      user-select: none;
    }

    #map {
      width: 100%;
      height: 100vh;
    }

    .controls {
      position: absolute;
      top: calc(8px + env(safe-area-inset-top));
      left: 8px;
      right: 8px;
      z-index: 10;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
    }

    button {
      width: 100%;
      border: 0;
      border-radius: 9px;
      padding: 7px 4px;
      min-height: 34px;
      background: rgba(0,122,255,0.94);
      color: #fff;
      font-size: 11.5px;
      font-weight: 800;
      line-height: 1.05;
      box-shadow: 0 2px 6px rgba(0,0,0,0.26);
      white-space: nowrap;
    }

    button.dark {
      background: rgba(25,25,25,0.92);
    }

    button.active {
      background: rgba(255,149,0,0.96);
      color: #111;
    }

    #info {
      position: absolute;
      top: calc(86px + env(safe-area-inset-top));
      left: 8px;
      right: 8px;
      z-index: 9;
      background: rgba(255,255,255,0.90);
      color: #111;
      padding: 6px 9px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.22);
      font-size: 11.5px;
      line-height: 1.28;
      pointer-events: none;
    }

    .boat {
      width: 54px;
      height: 54px;
      transform-origin: 50% 50%;
      will-change: transform;
    }

    .maplibregl-ctrl-bottom-left,
    .maplibregl-ctrl-bottom-right {
      display: none;
    }

    @media (max-width: 360px) {
      button {
        font-size: 10.5px;
        padding: 6px 2px;
        min-height: 32px;
      }

      #info {
        top: calc(82px + env(safe-area-inset-top));
        font-size: 10.8px;
      }

      .boat {
        width: 50px;
        height: 50px;
      }
    }
  </style>
</head>

<body>
<div id="map"></div>

<div class="controls">
  <button id="locBtn" onclick="goToMe()">📍내위치</button>
  <button id="compassBtn" onclick="enableCompass()">🧭나침반</button>
  <button id="headingBtn" onclick="toggleHeadingUp()">헤딩OFF</button>
  <button id="followBtn" class="dark" onclick="toggleFollow()">추적OFF</button>
  <button id="northBtn" class="dark" onclick="northUp()">북쪽고정</button>
  <button id="flipBtn" class="dark" onclick="toggleFlip()">보정0°</button>
</div>

<div id="info">GPS 준비 중...</div>

<script>
/* =========================================================
   기본 설정
========================================================= */
const IMAGE_URL = "gosam-low-water-optimized.jpg";

// MapLibre image source 좌표 순서: 좌상, 우상, 우하, 좌하
const IMAGE_COORDINATES = [
  [127.269358, 37.09483],
  [127.297100, 37.09483],
  [127.297100, 37.07270],
  [127.269358, 37.07270]
];

const INITIAL_CENTER = [127.283, 37.082];
const INITIAL_ZOOM = 14.8;

const RING_METERS = [5,10,15,20,25,30,35,40,45,50];
const HEADING_LINE_METERS = 50;

const MAX_GPS_ACCURACY_DROP = 70;
const WEAK_GPS_ACCURACY = 25;
const MIN_MOVE_METERS = 1.1;

const POSITION_SMOOTHING_GOOD = 0.28;
const POSITION_SMOOTHING_WEAK = 0.12;
const COMPASS_SMOOTHING = 0.22;
const GPS_HEADING_SMOOTHING = 0.18;

// iPhone에서 좌우가 반대로 느껴질 때 flipHeadingOffset=180 사용
let flipHeadingOffset = Number(localStorage.getItem("flipHeadingOffset") || 0);

/* =========================================================
   지도 생성
========================================================= */
const map = new maplibregl.Map({
  container: "map",
  center: INITIAL_CENTER,
  zoom: INITIAL_ZOOM,
  bearing: 0,
  pitch: 0,
  dragRotate: true,
  touchZoomRotate: true,
  style: {
    version: 8,
    sources: {
      osm: {
        type: "raster",
        tiles: ["https://tile.openstreetmap.org/{z}/{x}/{y}.png"],
        tileSize: 256,
        attribution: "© OpenStreetMap"
      }
    },
    layers: [
      { id: "osm", type: "raster", source: "osm" }
    ]
  }
});

/* =========================================================
   상태값
========================================================= */
const info = document.getElementById("info");
const compassBtn = document.getElementById("compassBtn");
const headingBtn = document.getElementById("headingBtn");
const followBtn = document.getElementById("followBtn");
const flipBtn = document.getElementById("flipBtn");

let headingUp = false;      // 지도 회전
let followBoat = false;     // 배를 화면 중앙으로 따라감
let compassEnabled = false;

let currentLngLat = null;
let smoothedLngLat = null;
let lastGpsAt = 0;

let compassHeadingRaw = null;
let compassHeading = null;
let gpsHeading = null;
let finalHeading = 0;

let boatMarker = null;

let programmaticMove = false;

/* =========================================================
   지도 로드
========================================================= */
map.on("load", () => {
  map.addSource("low-water", {
    type: "image",
    url: IMAGE_URL,
    coordinates: IMAGE_COORDINATES
  });

  map.addLayer({
    id: "low-water-layer",
    type: "raster",
    source: "low-water",
    paint: {
      "raster-opacity": 0.92,
      "raster-fade-duration": 0
    }
  });

  createRangeRings();
  createHeadingLine();
  startGPS();
  updateButtons();
});

/* 사용자가 직접 지도 조작하면 추적만 끔. 헤딩업은 유지. */
map.on("dragstart", () => {
  if (!programmaticMove) {
    followBoat = false;
    updateButtons();
  }
});

map.on("zoomstart", () => {
  if (!programmaticMove) {
    followBoat = false;
    updateButtons();
  }
});

/* =========================================================
   유틸
========================================================= */
function normalizeDeg(d) {
  d = d % 360;
  return d < 0 ? d + 360 : d;
}

function angleDiff(from, to) {
  return ((to - from + 540) % 360) - 180;
}

function smoothAngle(prev, next, factor) {
  if (prev === null || prev === undefined || isNaN(prev)) return normalizeDeg(next);
  return normalizeDeg(prev + angleDiff(prev, next) * factor);
}

function smoothPosition(prev, next, factor) {
  if (!prev) return next;
  return [
    prev[0] + (next[0] - prev[0]) * factor,
    prev[1] + (next[1] - prev[1]) * factor
  ];
}

function distanceMeters(a, b) {
  if (!a || !b) return Infinity;
  const R = 6371000;
  const lat1 = a[1] * Math.PI / 180;
  const lat2 = b[1] * Math.PI / 180;
  const dLat = (b[1] - a[1]) * Math.PI / 180;
  const dLng = (b[0] - a[0]) * Math.PI / 180;

  const x =
    Math.sin(dLat / 2) ** 2 +
    Math.cos(lat1) * Math.cos(lat2) * Math.sin(dLng / 2) ** 2;

  return R * 2 * Math.atan2(Math.sqrt(x), Math.sqrt(1 - x));
}

function destinationPoint(center, meters, bearingDeg) {
  const R = 6371000;
  const brng = bearingDeg * Math.PI / 180;
  const lat1 = center[1] * Math.PI / 180;
  const lng1 = center[0] * Math.PI / 180;

  const lat2 = Math.asin(
    Math.sin(lat1) * Math.cos(meters / R) +
    Math.cos(lat1) * Math.sin(meters / R) * Math.cos(brng)
  );

  const lng2 = lng1 + Math.atan2(
    Math.sin(brng) * Math.sin(meters / R) * Math.cos(lat1),
    Math.cos(meters / R) - Math.sin(lat1) * Math.sin(lat2)
  );

  return [lng2 * 180 / Math.PI, lat2 * 180 / Math.PI];
}

function formatSpeed(s) {
  if (s === null || s === undefined || isNaN(s)) return "-";
  return (s * 3.6).toFixed(1) + "km/h";
}

function formatHeading(h) {
  if (h === null || h === undefined || isNaN(h)) return "-";
  return Math.round(normalizeDeg(h)) + "°";
}

function correctedHeading(h) {
  return normalizeDeg(h + flipHeadingOffset);
}

function mapBearingForHeading() {
  // headingUp: 배는 화면 위 고정, 지도만 회전.
  // 사용자가 전 버전에서 좌우 반전이라고 판단했기 때문에 +heading 기준 유지.
  return correctedHeading(finalHeading);
}

function setMapBearingOnly() {
  if (!headingUp) return;

  map.rotateTo(mapBearingForHeading(), {
    duration: 70,
    easing: t => t
  });
}

function updateButtons() {
  headingBtn.classList.toggle("active", headingUp);
  headingBtn.innerText = headingUp ? "헤딩ON" : "헤딩OFF";

  followBtn.classList.toggle("active", followBoat);
  followBtn.innerText = followBoat ? "추적ON" : "추적OFF";

  compassBtn.classList.toggle("active", compassEnabled);
  compassBtn.innerText = compassEnabled ? "🧭ON" : "🧭나침반";

  flipBtn.innerText = flipHeadingOffset === 180 ? "보정180°" : "보정0°";
  flipBtn.classList.toggle("active", flipHeadingOffset === 180);
}

/* =========================================================
   보트 아이콘
========================================================= */
function makeBoatElement() {
  const el = document.createElement("div");
  el.className = "boat";
  el.innerHTML = `
    <svg width="54" height="54" viewBox="0 0 64 64">
      <defs>
        <filter id="boatShadow" x="-30%" y="-30%" width="160%" height="160%">
          <feDropShadow dx="0" dy="3" stdDeviation="2.2" flood-opacity="0.48"/>
        </filter>
      </defs>

      <g filter="url(#boatShadow)">
        <path
          d="M32 4
             C42 16 48 34 42 54
             C39 60 25 60 22 54
             C16 34 22 16 32 4 Z"
          fill="#007aff"
          stroke="#ffffff"
          stroke-width="3.5"
          stroke-linejoin="round"
        />
        <path
          d="M32 9
             C38 21 41 36 36 51
             C35 54 29 54 28 51
             C23 36 26 21 32 9 Z"
          fill="rgba(255,255,255,0.28)"
        />
        <path
          d="M32 4 L39 20 L32 16 L25 20 Z"
          fill="#ffffff"
          opacity="0.95"
        />
        <circle cx="32" cy="39" r="5.5" fill="#ffffff" opacity="0.96"/>
      </g>
    </svg>
  `;
  return el;
}

function updateBoat(pos) {
  if (!boatMarker) {
    boatMarker = new maplibregl.Marker({
      element: makeBoatElement(),
      anchor: "center",
      rotationAlignment: "viewport"
    }).setLngLat(pos).addTo(map);
  } else {
    boatMarker.setLngLat(pos);
  }

  const el = boatMarker.getElement();

  // 헤딩업 ON: 배는 항상 화면 위.
  // 북쪽고정: 배가 실제 보정된 방향으로 회전.
  const rotation = headingUp ? 0 : correctedHeading(finalHeading);
  el.style.transform = `translate(-50%, -50%) rotate(${normalizeDeg(rotation)}deg)`;
}

/* =========================================================
   거리링
========================================================= */
function circlePolygon(center, radiusMeters, points = 112) {
  const coords = [];
  for (let i = 0; i <= points; i++) {
    const bearing = 360 * i / points;
    coords.push(destinationPoint(center, radiusMeters, bearing));
  }

  return {
    type: "Feature",
    properties: { radius: radiusMeters },
    geometry: { type: "Polygon", coordinates: [coords] }
  };
}

function labelPoint(center, radiusMeters) {
  const p = destinationPoint(center, radiusMeters, 90);
  return {
    type: "Feature",
    properties: { label: radiusMeters + "m", radius: radiusMeters },
    geometry: { type: "Point", coordinates: p }
  };
}

function createRangeRings() {
  map.addSource("range-rings", {
    type: "geojson",
    data: { type: "FeatureCollection", features: [] }
  });

  map.addLayer({
    id: "range-rings-fill",
    type: "fill",
    source: "range-rings",
    paint: {
      "fill-color": "#007aff",
      "fill-opacity": 0.010
    }
  });

  map.addLayer({
    id: "range-rings-line",
    type: "line",
    source: "range-rings",
    paint: {
      "line-color": "#007aff",
      "line-width": [
        "case",
        ["in", ["get", "radius"], ["literal", [20,30,40,50]]],
        2.0,
        0.85
      ],
      "line-opacity": [
        "case",
        ["in", ["get", "radius"], ["literal", [20,30,40,50]]],
        0.88,
        0.50
      ]
    }
  });

  map.addSource("range-labels", {
    type: "geojson",
    data: { type: "FeatureCollection", features: [] }
  });

  map.addLayer({
    id: "range-labels-layer",
    type: "symbol",
    source: "range-labels",
    layout: {
      "text-field": ["get", "label"],
      "text-size": 10,
      "text-anchor": "center",
      "text-allow-overlap": true,
      "text-ignore-placement": true
    },
    paint: {
      "text-color": "#005fcc",
      "text-halo-color": "#ffffff",
      "text-halo-width": 1.5
    }
  });
}

function updateRangeRings(center) {
  if (!map.getSource("range-rings")) return;

  map.getSource("range-rings").setData({
    type: "FeatureCollection",
    features: RING_METERS.map(r => circlePolygon(center, r))
  });

  map.getSource("range-labels").setData({
    type: "FeatureCollection",
    features: RING_METERS.map(r => labelPoint(center, r))
  });
}

/* =========================================================
   진행 방향선
========================================================= */
function createHeadingLine() {
  map.addSource("heading-line", {
    type: "geojson",
    data: { type: "FeatureCollection", features: [] }
  });

  map.addLayer({
    id: "heading-line-layer",
    type: "line",
    source: "heading-line",
    paint: {
      "line-color": "#ff3b30",
      "line-width": 2.4,
      "line-opacity": 0.9,
      "line-dasharray": [1.4, 1]
    }
  });

  map.addLayer({
    id: "heading-line-label",
    type: "symbol",
    source: "heading-line",
    filter: ["==", ["get", "type"], "label"],
    layout: {
      "text-field": ["get", "label"],
      "text-size": 11,
      "text-anchor": "bottom",
      "text-allow-overlap": true,
      "text-ignore-placement": true
    },
    paint: {
      "text-color": "#ff3b30",
      "text-halo-color": "#ffffff",
      "text-halo-width": 1.6
    }
  });
}

function updateHeadingLine(center) {
  if (!map.getSource("heading-line")) return;

  const end = destinationPoint(center, HEADING_LINE_METERS, correctedHeading(finalHeading));

  map.getSource("heading-line").setData({
    type: "FeatureCollection",
    features: [
      {
        type: "Feature",
        properties: { type: "line" },
        geometry: {
          type: "LineString",
          coordinates: [center, end]
        }
      },
      {
        type: "Feature",
        properties: { type: "label", label: "50m" },
        geometry: {
          type: "Point",
          coordinates: end
        }
      }
    ]
  });
}

/* =========================================================
   헤딩 선택
========================================================= */
function chooseHeading(speed) {
  // 제자리 회전이 중요하므로 나침반 우선
  if (compassHeading !== null && !isNaN(compassHeading)) {
    finalHeading = smoothAngle(finalHeading, compassHeading, COMPASS_SMOOTHING);
    return "나침반";
  }

  if (gpsHeading !== null && !isNaN(gpsHeading)) {
    finalHeading = smoothAngle(finalHeading, gpsHeading, GPS_HEADING_SMOOTHING);
    return "GPS";
  }

  return "대기";
}

/* =========================================================
   전체 업데이트
========================================================= */
function updateInfo(accuracy, speed, source) {
  info.innerHTML =
    `📍${accuracy ? Math.round(accuracy) + "m" : "-"} · 🧭${formatHeading(correctedHeading(finalHeading))}(${source}) · 🚤${formatSpeed(speed)}<br>` +
    `헤딩:<b>${headingUp ? "ON" : "OFF"}</b> · 추적:<b>${followBoat ? "ON" : "OFF"}</b> · 보정:<b>${flipHeadingOffset}°</b> · ⭕5~50m · 🔴50m`;
}

function updateAll(pos, accuracy, speed, source) {
  if (!pos) return;

  updateBoat(pos);
  updateRangeRings(pos);
  updateHeadingLine(pos);

  // 헤딩업은 bearing만 바꿈. center/zoom은 followBoat일 때만 건드림.
  if (headingUp) {
    setMapBearingOnly();
  }

  if (followBoat) {
    programmaticMove = true;
    map.easeTo({
      center: pos,
      duration: 120,
      easing: t => t
    });
    setTimeout(() => { programmaticMove = false; }, 170);
  }

  updateInfo(accuracy, speed, source);
}

/* =========================================================
   아이폰 나침반
========================================================= */
window.enableCompass = async function() {
  try {
    if (
      typeof DeviceOrientationEvent !== "undefined" &&
      typeof DeviceOrientationEvent.requestPermission === "function"
    ) {
      const result = await DeviceOrientationEvent.requestPermission();
      if (result !== "granted") {
        alert("나침반 권한이 거부되었습니다. iPhone Safari 설정에서 동작 및 방향 접근을 확인하세요.");
        return;
      }
    }

    window.addEventListener("deviceorientationabsolute", onOrientation, true);
    window.addEventListener("deviceorientation", onOrientation, true);

    compassEnabled = true;
    updateButtons();
  } catch (e) {
    alert("나침반 권한 요청 실패: " + e.message);
  }
};

function onOrientation(e) {
  let h = null;

  if (e.webkitCompassHeading !== undefined && e.webkitCompassHeading !== null) {
    h = e.webkitCompassHeading;
  } else if (e.alpha !== null && e.alpha !== undefined) {
    h = 360 - e.alpha;
  }

  if (h === null || isNaN(h)) return;

  compassHeadingRaw = normalizeDeg(h);
  compassHeading = smoothAngle(compassHeading, compassHeadingRaw, COMPASS_SMOOTHING);

  const source = chooseHeading(0);

  // GPS 이동이 없어도 제자리 회전 반영
  if (smoothedLngLat) {
    updateAll(smoothedLngLat, null, 0, source);
  } else {
    updateInfo(null, 0, source);
  }
}

/* =========================================================
   GPS
========================================================= */
function startGPS() {
  if (!navigator.geolocation) {
    info.innerHTML = "GPS를 지원하지 않는 브라우저입니다.";
    return;
  }

  navigator.geolocation.watchPosition(
    pos => {
      const now = Date.now();
      if (now - lastGpsAt < 700) return;
      lastGpsAt = now;

      const lat = pos.coords.latitude;
      const lng = pos.coords.longitude;
      const accuracy = pos.coords.accuracy;
      const speed = pos.coords.speed;
      const heading = pos.coords.heading;

      if (accuracy && accuracy > MAX_GPS_ACCURACY_DROP) {
        updateInfo(accuracy, speed, "정확도낮음");
        return;
      }

      const raw = [lng, lat];
      currentLngLat = raw;

      if (heading !== null && heading !== undefined && !isNaN(heading)) {
        gpsHeading = normalizeDeg(heading);
      }

      if (smoothedLngLat && distanceMeters(smoothedLngLat, raw) < MIN_MOVE_METERS) {
        const source = chooseHeading(speed);
        updateAll(smoothedLngLat, accuracy, speed, source);
        return;
      }

      const factor = accuracy && accuracy > WEAK_GPS_ACCURACY
        ? POSITION_SMOOTHING_WEAK
        : POSITION_SMOOTHING_GOOD;

      smoothedLngLat = smoothPosition(smoothedLngLat, raw, factor);

      const source = chooseHeading(speed);
      updateAll(smoothedLngLat, accuracy, speed, source);
    },
    err => {
      info.innerHTML = "GPS 오류. HTTPS 주소와 Safari 위치 권한을 확인하세요.";
    },
    {
      enableHighAccuracy: true,
      maximumAge: 1000,
      timeout: 15000
    }
  );
}

/* =========================================================
   버튼
========================================================= */
window.goToMe = function() {
  if (!navigator.geolocation) {
    alert("위치 서비스를 지원하지 않습니다.");
    return;
  }

  navigator.geolocation.getCurrentPosition(
    pos => {
      const lng = pos.coords.longitude;
      const lat = pos.coords.latitude;
      const now = [lng, lat];

      currentLngLat = now;
      smoothedLngLat = now;
      followBoat = true;

      if (pos.coords.heading !== null && pos.coords.heading !== undefined && !isNaN(pos.coords.heading)) {
        gpsHeading = normalizeDeg(pos.coords.heading);
      }

      const source = chooseHeading(pos.coords.speed);

      programmaticMove = true;
      map.flyTo({
        center: now,
        zoom: Math.max(map.getZoom(), 17),
        bearing: headingUp ? mapBearingForHeading() : map.getBearing(),
        speed: 1.5,
        essential: true
      });
      setTimeout(() => { programmaticMove = false; }, 600);

      updateAll(now, pos.coords.accuracy, pos.coords.speed, source);
      updateButtons();
    },
    () => {
      alert("현재 위치를 가져오지 못했습니다. 위치 권한을 확인하세요.");
    },
    {
      enableHighAccuracy: true,
      timeout: 12000,
      maximumAge: 0
    }
  );
};

window.toggleHeadingUp = function() {
  headingUp = !headingUp;

  if (headingUp) {
    if (!compassEnabled) {
      alert("제자리 회전까지 정확히 보려면 먼저 ‘나침반’을 누르세요.");
    }

    programmaticMove = true;
    map.easeTo({
      bearing: mapBearingForHeading(),
      duration: 180
    });
    setTimeout(() => { programmaticMove = false; }, 230);
  } else {
    programmaticMove = true;
    map.easeTo({
      bearing: 0,
      duration: 180
    });
    setTimeout(() => { programmaticMove = false; }, 230);
  }

  if (smoothedLngLat) updateAll(smoothedLngLat, null, 0, chooseHeading(0));
  updateButtons();
};

window.toggleFollow = function() {
  followBoat = !followBoat;

  if (followBoat && smoothedLngLat) {
    programmaticMove = true;
    map.easeTo({
      center: smoothedLngLat,
      zoom: Math.max(map.getZoom(), 17),
      duration: 220
    });
    setTimeout(() => { programmaticMove = false; }, 260);
  }

  updateButtons();
};

window.northUp = function() {
  headingUp = false;

  programmaticMove = true;
  map.easeTo({
    bearing: 0,
    duration: 200
  });
  setTimeout(() => { programmaticMove = false; }, 240);

  if (smoothedLngLat) updateAll(smoothedLngLat, null, 0, chooseHeading(0));
  updateButtons();
};

window.toggleFlip = function() {
  flipHeadingOffset = flipHeadingOffset === 180 ? 0 : 180;
  localStorage.setItem("flipHeadingOffset", String(flipHeadingOffset));

  if (smoothedLngLat) updateAll(smoothedLngLat, null, 0, chooseHeading(0));
  updateButtons();
};
</script>
</body>
</html>
