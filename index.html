<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>고삼저수지 GPS</title>

  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />

  <style>
    html, body { margin:0; width:100%; height:100%; overflow:hidden; font-family:-apple-system,BlinkMacSystemFont,"Noto Sans KR",sans-serif; }
    #map { width:100%; height:100vh; }

    .controls {
      position:absolute; top:calc(12px + env(safe-area-inset-top)); left:12px; right:12px;
      z-index:10; display:flex; gap:8px; flex-wrap:wrap;
    }

    button {
      border:0; border-radius:11px; padding:11px 13px;
      background:rgba(0,122,255,.96); color:#fff;
      font-size:14px; font-weight:800;
      box-shadow:0 2px 8px rgba(0,0,0,.28);
    }

    button.dark { background:rgba(25,25,25,.94); }
    button.active { background:rgba(255,149,0,.98); color:#111; }

    #info {
      position:absolute; top:calc(64px + env(safe-area-inset-top)); left:12px; right:12px;
      z-index:9; background:rgba(255,255,255,.95); color:#111;
      padding:11px 14px; border-radius:13px;
      box-shadow:0 2px 10px rgba(0,0,0,.25);
      font-size:14px; line-height:1.45; pointer-events:none;
    }

    .boat {
      width:54px; height:54px;
      transform-origin:50% 50%;
      will-change:transform;
    }

    .maplibregl-ctrl-bottom-left,
    .maplibregl-ctrl-bottom-right { display:none; }
  </style>
</head>

<body>
<div id="map"></div>

<div class="controls">
  <button onclick="goToMe()">📍 내 위치</button>
  <button id="compassBtn" onclick="enableCompass()">🧭 나침반 허용</button>
  <button id="headingBtn" onclick="toggleHeadingUp()">헤딩업 OFF</button>
  <button class="dark" onclick="northUp()">북쪽고정</button>
</div>

<div id="info">GPS 준비 중...</div>

<script>
const IMAGE_URL = "gosam-low-water-optimized.jpg";

const IMAGE_COORDINATES = [
  [127.269358, 37.09483],
  [127.297100, 37.09483],
  [127.297100, 37.07270],
  [127.269358, 37.07270]
];

const INITIAL_CENTER = [127.283, 37.082];
const INITIAL_ZOOM = 14.8;

const RING_METERS = [5,10,15,20,25,30,35,40,45,50];

let headingUp = false;
let compassEnabled = false;
let currentLngLat = null;
let smoothedLngLat = null;
let compassHeading = null;
let gpsHeading = null;
let finalHeading = 0;
let boatMarker = null;
let lastGpsAt = 0;

const info = document.getElementById("info");
const compassBtn = document.getElementById("compassBtn");
const headingBtn = document.getElementById("headingBtn");

const map = new maplibregl.Map({
  container: "map",
  center: INITIAL_CENTER,
  zoom: INITIAL_ZOOM,
  bearing: 0,
  pitch: 0,
  dragRotate: true,
  touchZoomRotate: true,
  style: {
    version: 8,
    sources: {
      osm: {
        type: "raster",
        tiles: ["https://tile.openstreetmap.org/{z}/{x}/{y}.png"],
        tileSize: 256,
        attribution: "© OpenStreetMap"
      }
    },
    layers: [{ id:"osm", type:"raster", source:"osm" }]
  }
});

map.on("load", () => {
  map.addSource("low-water", {
    type: "image",
    url: IMAGE_URL,
    coordinates: IMAGE_COORDINATES
  });

  map.addLayer({
    id: "low-water-layer",
    type: "raster",
    source: "low-water",
    paint: { "raster-opacity": 0.92 }
  });

  createRangeRings();
  startGPS();
});

function normalizeDeg(d) {
  d = d % 360;
  return d < 0 ? d + 360 : d;
}

function angleDiff(from, to) {
  return ((to - from + 540) % 360) - 180;
}

function smoothAngle(prev, next, factor) {
  return normalizeDeg(prev + angleDiff(prev, next) * factor);
}

function smoothPosition(prev, next, factor) {
  if (!prev) return next;
  return [
    prev[0] + (next[0] - prev[0]) * factor,
    prev[1] + (next[1] - prev[1]) * factor
  ];
}

function formatSpeed(s) {
  if (s == null || isNaN(s)) return "-";
  return (s * 3.6).toFixed(1) + "km/h";
}

function formatHeading(h) {
  if (h == null || isNaN(h)) return "-";
  return Math.round(normalizeDeg(h)) + "°";
}

function distanceMeters(a, b) {
  const R = 6371000;
  const lat1 = a[1] * Math.PI / 180;
  const lat2 = b[1] * Math.PI / 180;
  const dLat = (b[1] - a[1]) * Math.PI / 180;
  const dLng = (b[0] - a[0]) * Math.PI / 180;
  const x = Math.sin(dLat/2)**2 + Math.cos(lat1)*Math.cos(lat2)*Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(x), Math.sqrt(1-x));
}

function makeBoatElement() {
  const el = document.createElement("div");
  el.className = "boat";
  el.innerHTML = `
    <svg width="54" height="54" viewBox="0 0 54 54">
      <g filter="url(#shadow)">
        <path d="M27 3 C36 15 40 30 35 45 C32 49 22 49 19 45 C14 30 18 15 27 3 Z"
              fill="#007aff" stroke="white" stroke-width="3"/>
        <path d="M27 8 L33 42 L27 47 L21 42 Z"
              fill="rgba(255,255,255,0.25)"/>
        <circle cx="27" cy="32" r="5" fill="white"/>
      </g>
      <defs>
        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
          <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.45"/>
        </filter>
      </defs>
    </svg>
  `;
  return el;
}

function updateBoat(pos) {
  if (!boatMarker) {
    boatMarker = new maplibregl.Marker({
      element: makeBoatElement(),
      anchor: "center",
      rotationAlignment: "map"
    }).setLngLat(pos).addTo(map);
  } else {
    boatMarker.setLngLat(pos);
  }

  const el = boatMarker.getElement();
  const mapBearing = map.getBearing() || 0;
  el.style.transform = `translate(-50%, -50%) rotate(${normalizeDeg(finalHeading + mapBearing)}deg)`;
}

function circlePolygon(center, radiusMeters, points = 96) {
  const coords = [];
  const lat = center[1] * Math.PI / 180;
  const lng = center[0] * Math.PI / 180;
  const R = 6371000;

  for (let i = 0; i <= points; i++) {
    const brng = 2 * Math.PI * i / points;
    const lat2 = Math.asin(
      Math.sin(lat) * Math.cos(radiusMeters / R) +
      Math.cos(lat) * Math.sin(radiusMeters / R) * Math.cos(brng)
    );
    const lng2 = lng + Math.atan2(
      Math.sin(brng) * Math.sin(radiusMeters / R) * Math.cos(lat),
      Math.cos(radiusMeters / R) - Math.sin(lat) * Math.sin(lat2)
    );
    coords.push([lng2 * 180 / Math.PI, lat2 * 180 / Math.PI]);
  }

  return {
    type: "Feature",
    properties: { radius: radiusMeters },
    geometry: { type: "Polygon", coordinates: [coords] }
  };
}

function labelPoint(center, radiusMeters) {
  const R = 6371000;
  const lat = center[1] * Math.PI / 180;
  const lng = center[0] * Math.PI / 180;
  const bearing = Math.PI / 2;

  const lat2 = Math.asin(
    Math.sin(lat) * Math.cos(radiusMeters / R) +
    Math.cos(lat) * Math.sin(radiusMeters / R) * Math.cos(bearing)
  );

  const lng2 = lng + Math.atan2(
    Math.sin(bearing) * Math.sin(radiusMeters / R) * Math.cos(lat),
    Math.cos(radiusMeters / R) - Math.sin(lat) * Math.sin(lat2)
  );

  return {
    type: "Feature",
    properties: { label: radiusMeters + "m" },
    geometry: { type: "Point", coordinates: [lng2 * 180 / Math.PI, lat2 * 180 / Math.PI] }
  };
}

function createRangeRings() {
  map.addSource("range-rings", {
    type: "geojson",
    data: { type:"FeatureCollection", features: [] }
  });

  map.addLayer({
    id: "range-rings-fill",
    type: "fill",
    source: "range-rings",
    paint: {
      "fill-color": "#007aff",
      "fill-opacity": 0.015
    }
  });

  map.addLayer({
    id: "range-rings-line",
    type: "line",
    source: "range-rings",
    paint: {
      "line-color": "#007aff",
      "line-width": [
        "case",
        ["in", ["get", "radius"], ["literal", [20,30,40,50]]],
        2,
        1
      ],
      "line-opacity": 0.85
    }
  });

  map.addSource("range-labels", {
    type: "geojson",
    data: { type:"FeatureCollection", features: [] }
  });

  map.addLayer({
    id: "range-labels-layer",
    type: "symbol",
    source: "range-labels",
    layout: {
      "text-field": ["get", "label"],
      "text-size": 12,
      "text-anchor": "center",
      "text-allow-overlap": true
    },
    paint: {
      "text-color": "#005fcc",
      "text-halo-color": "#ffffff",
      "text-halo-width": 2
    }
  });
}

function updateRangeRings(center) {
  if (!map.getSource("range-rings")) return;

  map.getSource("range-rings").setData({
    type: "FeatureCollection",
    features: RING_METERS.map(r => circlePolygon(center, r))
  });

  map.getSource("range-labels").setData({
    type: "FeatureCollection",
    features: RING_METERS.map(r => labelPoint(center, r))
  });
}

function chooseHeading(speed) {
  if (compassHeading != null && !isNaN(compassHeading)) {
    finalHeading = smoothAngle(finalHeading, compassHeading, 0.22);
    return "나침반";
  }

  if (gpsHeading != null && !isNaN(gpsHeading)) {
    finalHeading = smoothAngle(finalHeading, gpsHeading, 0.18);
    return "GPS";
  }

  return "대기";
}

function updateInfo(accuracy, speed, source) {
  info.innerHTML =
    `📍 정확도: <b>${Math.round(accuracy || 0)}m</b><br>` +
    `🚤 속도: <b>${formatSpeed(speed)}</b><br>` +
    `🧭 뱃머리: <b>${formatHeading(finalHeading)}</b> (${source})<br>` +
    `⭕ 거리링: <b>5m ~ 50m</b><br>` +
    `모드: <b>${headingUp ? "헤딩업" : "북쪽고정"}</b>`;
}

function updateAll(pos, accuracy, speed, source) {
  updateBoat(pos);
  updateRangeRings(pos);

  if (headingUp) {
    map.easeTo({
      center: pos,
      bearing: -normalizeDeg(finalHeading),
      duration: 120,
      easing: t => t
    });
  }

  updateInfo(accuracy, speed, source);
}

window.enableCompass = async function() {
  try {
    if (
      typeof DeviceOrientationEvent !== "undefined" &&
      typeof DeviceOrientationEvent.requestPermission === "function"
    ) {
      const result = await DeviceOrientationEvent.requestPermission();
      if (result !== "granted") {
        alert("나침반 권한이 거부되었습니다.");
        return;
      }
    }

    window.addEventListener("deviceorientationabsolute", onOrientation, true);
    window.addEventListener("deviceorientation", onOrientation, true);

    compassEnabled = true;
    compassBtn.classList.add("active");
    compassBtn.innerText = "🧭 나침반 ON";
  } catch (e) {
    alert("나침반 권한 요청 실패: " + e.message);
  }
};

function onOrientation(e) {
  let h = null;

  if (e.webkitCompassHeading != null) {
    h = e.webkitCompassHeading;
  } else if (e.alpha != null) {
    h = 360 - e.alpha;
  }

  if (h == null || isNaN(h)) return;

  compassHeading = smoothAngle(compassHeading ?? h, h, 0.22);
  const source = chooseHeading(0);

  if (smoothedLngLat) {
    updateAll(smoothedLngLat, null, 0, source);
  }
}

function startGPS() {
  if (!navigator.geolocation) {
    info.innerHTML = "GPS를 지원하지 않는 브라우저입니다.";
    return;
  }

  navigator.geolocation.watchPosition(
    pos => {
      const now = Date.now();
      if (now - lastGpsAt < 700) return;
      lastGpsAt = now;

      const lat = pos.coords.latitude;
      const lng = pos.coords.longitude;
      const accuracy = pos.coords.accuracy;
      const speed = pos.coords.speed;
      const heading = pos.coords.heading;

      if (accuracy && accuracy > 60) {
        updateInfo(accuracy, speed, "정확도 낮음");
        return;
      }

      const raw = [lng, lat];
      currentLngLat = raw;

      if (heading != null && !isNaN(heading)) {
        gpsHeading = normalizeDeg(heading);
      }

      if (smoothedLngLat && distanceMeters(smoothedLngLat, raw) < 1.2) {
        const source = chooseHeading(speed);
        updateAll(smoothedLngLat, accuracy, speed, source);
        return;
      }

      smoothedLngLat = smoothPosition(smoothedLngLat, raw, accuracy > 25 ? 0.12 : 0.28);

      const source = chooseHeading(speed);
      updateAll(smoothedLngLat, accuracy, speed, source);
    },
    err => {
      info.innerHTML = "GPS 오류. Safari 위치 권한과 HTTPS 주소를 확인하세요.";
    },
    {
      enableHighAccuracy: true,
      maximumAge: 1000,
      timeout: 15000
    }
  );
}

window.goToMe = function() {
  if (!navigator.geolocation) {
    alert("위치 서비스를 지원하지 않습니다.");
    return;
  }

  navigator.geolocation.getCurrentPosition(
    pos => {
      const lng = pos.coords.longitude;
      const lat = pos.coords.latitude;
      const now = [lng, lat];

      currentLngLat = now;
      smoothedLngLat = now;

      map.flyTo({
        center: now,
        zoom: 17,
        speed: 1.6,
        essential: true
      });

      updateAll(now, pos.coords.accuracy, pos.coords.speed, chooseHeading(pos.coords.speed));
    },
    () => alert("현재 위치를 가져오지 못했습니다."),
    {
      enableHighAccuracy: true,
      timeout: 12000,
      maximumAge: 0
    }
  );
};

window.toggleHeadingUp = function() {
  headingUp = !headingUp;

  if (headingUp) {
    headingBtn.classList.add("active");
    headingBtn.innerText = "헤딩업 ON";

    if (!compassEnabled) {
      alert("제자리 회전까지 정확히 보려면 먼저 ‘나침반 허용’을 누르세요.");
    }

    if (smoothedLngLat) {
      map.easeTo({
        center: smoothedLngLat,
        bearing: -normalizeDeg(finalHeading),
        zoom: Math.max(map.getZoom(), 17),
        duration: 250
      });
    }
  } else {
    headingBtn.classList.remove("active");
    headingBtn.innerText = "헤딩업 OFF";
  }
};

window.northUp = function() {
  headingUp = false;
  headingBtn.classList.remove("active");
  headingBtn.innerText = "헤딩업 OFF";

  map.easeTo({
    bearing: 0,
    duration: 250
  });
};
</script>
</body>
</html>
