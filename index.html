<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>고삼저수지 보트 GPS</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Leaflet 지도 회전 플러그인 -->
  <script src="https://unpkg.com/leaflet-rotate@0.2.8/dist/leaflet-rotate-src.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #111;
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      -webkit-user-select: none;
      user-select: none;
    }

    #map {
      width: 100%;
      height: 100dvh;
      background: #111;
    }

    #info {
      position: absolute;
      top: calc(8px + env(safe-area-inset-top));
      left: 8px;
      right: 64px;
      z-index: 1000;
      background: rgba(255,255,255,0.88);
      color: #111;
      padding: 6px 8px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.18);
      font-size: 10.5px;
      line-height: 1.25;
      pointer-events: none;
      box-sizing: border-box;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }

    .controls {
      position: absolute;
      top: calc(76px + env(safe-area-inset-top));
      right: 8px;
      z-index: 1001;
      display: flex;
      flex-direction: column;
      gap: 8px;
      pointer-events: none;
    }
    
    .gps-status {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: rgba(20,20,20,0.92);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.34);
      pointer-events: none;
    }
    
    button {
      pointer-events: auto;
      width: 46px;
      height: 46px;
      border: 0;
      border-radius: 50%;
      background: rgba(0,122,255,0.94);
      color: #fff;
      font-size: 19px;
      font-weight: 800;
      line-height: 46px;
      text-align: center;
      box-shadow: 0 3px 10px rgba(0,0,0,0.34);
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    button.dark { background: rgba(25,25,25,0.92); }
    button.active { background: rgba(255,149,0,0.98); color: #111; }

    .boat-wrap {
      width: 52px;
      height: 52px;
      transform-origin: 50% 50%;
      will-change: transform;
    }

    .leaflet-control-attribution {
      display: none;
    }

    .ring-label {
      color: #006400;
      font-weight: 800;
      background: rgba(255,255,255,0.75);
      padding: 1px 4px;
      border-radius: 8px;
      text-shadow: none;
    }
      
    .heading-label {
      color: #FF1493;
      font-size: 11px;
      font-weight: 900;
      text-shadow:
        -1px -1px 0 #000,
         1px -1px 0 #000,
        -1px  1px 0 #000,
         1px  1px 0 #000;
      white-space: nowrap;
    }

    @media (max-width: 390px) {
      #info { right: 58px; font-size: 10px; }
      .controls { right: 7px; gap: 7px; }
      button { width: 42px; height: 42px; font-size: 18px; line-height: 42px; }
      .boat-wrap { width: 48px; height: 48px; }
    }
  </style>
</head>

<body>
<div id="map"></div>

<div class="controls">
  <div id="gpsStatus" class="gps-status">
  📡❌
</div>
  <button id="locBtn" onclick="goToMe()" aria-label="내 위치" title="내 위치">📍</button>
  <button id="compassBtn" onclick="enableCompass()" aria-label="나침반" title="나침반">🧭</button>
  <button id="headingBtn" class="dark" onclick="toggleHeadingUp()" aria-label="헤딩업" title="헤딩업">⬆️</button>
  <button id="followBtn" class="dark" onclick="toggleFollow()" aria-label="추적" title="추적">🎯</button>
  <button id="pinBtn" onclick="addPinHere()" title="핀 추가">📌</button>
</div>

<script>
/* =========================================================
   설정
========================================================= */
const IMAGE_URL = "gosam-low-water-optimized.jpg";

const INITIAL_CENTER = [37.082, 127.283];
const INITIAL_ZOOM = 18;

// Leaflet bounds: [[south, west], [north, east]]
const IMAGE_BOUNDS = [
  [37.07270, 127.269358],
  [37.09483, 127.297100]
];

const RING_METERS = [5,10,20,30,40,50];
const HEADING_LINE_METERS = 50;

const MAX_GPS_ACCURACY_DROP = 80;
const WEAK_GPS_ACCURACY = 25;
const MIN_MOVE_METERS = 1.0;

const POS_SMOOTH_GOOD = 0.45;
const POS_SMOOTH_WEAK = 0.25;
const COMPASS_SMOOTH = 0.20;
const GPS_HEAD_SMOOTH = 0.16;

// Leaflet rotate 방향이 반대로 느껴지면 -1로 바꾸면 됨
const HEADING_BEARING_SIGN = 1;
const HEADING_OFFSET = 0;

// 회전 안정화
const BEARING_UPDATE_MS = 80;
const BEARING_MIN_DIFF = 1.5;

/* =========================================================
   지도 생성
========================================================= */
const map = L.map("map", {
  center: INITIAL_CENTER,
  zoom: INITIAL_ZOOM,
  zoomControl: false,
  attributionControl: false,
  rotate: true,
  touchRotate: false,
  bearing: 0,
  inertia: true,
  preferCanvas: true
});

L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", {
  maxZoom: 19,
  crossOrigin: true
}).addTo(map);

L.imageOverlay(IMAGE_URL, IMAGE_BOUNDS, {
  opacity: 0.92,
  interactive: false
}).addTo(map);

/* =========================================================
   상태
========================================================= */
const gpsStatus = document.getElementById("gpsStatus");
const compassBtn = document.getElementById("compassBtn");
const headingBtn = document.getElementById("headingBtn");
const followBtn = document.getElementById("followBtn");

let headingUp = false;
let followBoat = false; // starts disabled
let compassEnabled = false;

let currentLatLng = null;
let smoothedLatLng = null;
let pinMode = false;

let compassHeading = null;
let gpsHeading = null;
let finalHeading = 0;

let boatMarker = null;
let boatWrapEl = null;
let lastGpsAt = 0;
let lastCenterUpdateAt = 0;
let lastBearingUpdateAt = 0;
let lastBearingApplied = 0;

let userInteractingUntil = 0;

/* =========================================================
   사용자 조작 감지
========================================================= */
function markUserInteracting() {
  userInteractingUntil = Date.now() + 700;
}

["dragstart", "zoomstart", "movestart"].forEach(ev => {
  map.on(ev, () => {
    if (!map._programmaticMove) { markUserInteracting(); followBoat = false; updateButtons(); }
  });
});

function isUserInteracting() {
  return Date.now() < userInteractingUntil;
}

function programmatic(fn, duration = 300) {
  map._programmaticMove = true;
  fn();
  setTimeout(() => { map._programmaticMove = false; }, duration);
}

map.on("click", function(e) {

  if (!pinMode) return;

  pinMode = false;

  if (!confirm("여기에 핀을 추가하시겠습니까?")) {
    return;
  }

  const pins = JSON.parse(localStorage.getItem("gosamPins") || "[]");

  pins.push({
    lat: e.latlng.lat,
    lng: e.latlng.lng,
    name: "Point " + (pins.length + 1),
    createdAt: Date.now()
  });

  localStorage.setItem(
    "gosamPins",
    JSON.stringify(pins)
  );

  loadPins();

});
/* =========================================================
   유틸
========================================================= */
function normalizeDeg(d) {
  d = d % 360;
  return d < 0 ? d + 360 : d;
}

function angleDiff(from, to) {
  return ((to - from + 540) % 360) - 180;
}

function smoothAngle(prev, next, factor) {
  if (prev === null || prev === undefined || isNaN(prev)) return normalizeDeg(next);
  return normalizeDeg(prev + angleDiff(prev, next) * factor);
}

function smoothLatLng(prev, next, factor) {
  if (!prev) return next;
  return L.latLng(
    prev.lat + (next.lat - prev.lat) * factor,
    prev.lng + (next.lng - prev.lng) * factor
  );
}

function formatSpeed(s) {
  if (s === null || s === undefined || isNaN(s)) return "-";
  return (s * 3.6).toFixed(1) + "km/h";
}

function formatHeading(h) {
  if (h === null || h === undefined || isNaN(h)) return "-";
  return Math.round(normalizeDeg(h)) + "°";
}

function destinationPoint(center, meters, bearingDeg) {
  const R = 6371000;
  const brng = bearingDeg * Math.PI / 180;
  const lat1 = center.lat * Math.PI / 180;
  const lng1 = center.lng * Math.PI / 180;

  const lat2 = Math.asin(
    Math.sin(lat1) * Math.cos(meters / R) +
    Math.cos(lat1) * Math.sin(meters / R) * Math.cos(brng)
  );

  const lng2 = lng1 + Math.atan2(
    Math.sin(brng) * Math.sin(meters / R) * Math.cos(lat1),
    Math.cos(meters / R) - Math.sin(lat1) * Math.sin(lat2)
  );

  return L.latLng(lat2 * 180 / Math.PI, lng2 * 180 / Math.PI);
}

function updateButtons() {
  compassBtn.classList.toggle("active", compassEnabled);
  headingBtn.classList.toggle("active", headingUp);
  followBtn.classList.toggle("active", followBoat);
}

/* =========================================================
   보트 아이콘
========================================================= */
function boatSvg(size = 52) {
  return `
    <svg width="${size}" height="${size}" viewBox="0 0 64 64">
      <defs>
        <filter id="boatShadow${size}" x="-30%" y="-30%" width="160%" height="160%">
          <feDropShadow dx="0" dy="3" stdDeviation="2.2" flood-opacity="0.48"/>
        </filter>
      </defs>
      <g filter="url(#boatShadow${size})">
        <path d="M32 4 C42 16 48 34 42 54 C39 60 25 60 22 54 C16 34 22 16 32 4 Z"
          fill="#007aff" stroke="#ffffff" stroke-width="3.5" stroke-linejoin="round"/>
        <path d="M32 9 C38 21 41 36 36 51 C35 54 29 54 28 51 C23 36 26 21 32 9 Z"
          fill="rgba(255,255,255,0.28)"/>
        <path d="M32 4 L39 20 L32 16 L25 20 Z" fill="#ffffff" opacity="0.95"/>
        <circle cx="32" cy="39" r="5.5" fill="#ffffff" opacity="0.96"/>
      </g>
    </svg>`;
}

function createBoatIcon(rotation) {
  return L.divIcon({
    className: "",
    html: `<div id="boatWrap" class="boat-wrap" style="transform: rotate(${rotation}deg);">${boatSvg(52)}</div>`,
    iconSize: [52, 52],
    iconAnchor: [26, 26]
  });
}

function getBoatRotation() {
  // 헤딩업 ON: 지도 자체가 회전하므로 보트는 화면 위쪽 고정
  // 헤딩업 OFF: 보트 아이콘이 나침반/방향값을 따라 회전
  return headingUp ? 0 : finalHeading;
}

function updateBoatRotationOnly() {
  if (!boatWrapEl) {
    boatWrapEl = document.getElementById("boatWrap");
  }
  if (!boatWrapEl) return;

  boatWrapEl.style.transform = `rotate(${normalizeDeg(getBoatRotation())}deg)`;
}

function updateBoat(pos) {
  if (!boatMarker) {
    boatMarker = L.marker(pos, {
      icon: createBoatIcon(getBoatRotation()),
      interactive: false
    }).addTo(map);

    boatWrapEl = document.getElementById("boatWrap");
  } else {
    boatMarker.setLatLng(pos);
  }

  // 중요: GPS 이벤트에서는 위치만 갱신하고, 아이콘 재생성은 하지 않는다.
  // 회전은 나침반 이벤트에서 CSS transform으로 즉시 갱신한다.
  updateBoatRotationOnly();
}

/* =========================================================
   거리 링 / 진행선
========================================================= */
const ringLayer = L.layerGroup().addTo(map);
const labelLayer = L.layerGroup().addTo(map);
let headingLine = null;
let headingLabel = null;
let accuracyCircle = null;

let pinLayer = L.layerGroup().addTo(map);  
  
const ringCircles = {};
const ringLabels = {};
  
function createRangeRings() {
  RING_METERS.forEach(r => {
    const circle = L.circle(INITIAL_CENTER, {
      radius: r,
      color: "#7CFC00",
      fillColor: "#7CFC00",
      weight: [20,30,40,50].includes(r) ? 3 : 1.5,
      opacity: [20,30,40,50].includes(r) ? 1.0 : 0.65,
      fillOpacity: 0.04,
      interactive: false
    }).addTo(ringLayer);

    const label = L.marker(INITIAL_CENTER, {
      icon: L.divIcon({
        className: "ring-label",
        html: `${r}m`,
        iconSize: [30, 14],
        iconAnchor: [15, 7]
      }),
      interactive: false
    }).addTo(labelLayer);

    ringCircles[r] = circle;
    ringLabels[r] = label;
  });
}

function updateRangeRings(center) {
  RING_METERS.forEach(r => {
    ringCircles[r].setLatLng(center);
    ringLabels[r].setLatLng(
    destinationPoint(center, r, headingUp ? finalHeading : 0)
    );
  });
}

function createHeadingLine() {
  headingLine = L.polyline([], {
    color: "#FF1493",
    weight: 2,
    opacity: 0.9,
    dashArray: "6,4",
    interactive: false
  }).addTo(map);

  headingLabel = L.marker(INITIAL_CENTER, {
    icon: L.divIcon({
      className: "heading-label",
      html: "N",
      iconSize: [34, 16],
      iconAnchor: [17, 8]
    }),
    interactive: false
  }).addTo(map);
}

function updateHeadingLine(center) {
    const end = destinationPoint(
        center,
        HEADING_LINE_METERS,
        0   // 항상 북쪽
    );

    headingLine.setLatLngs([center, end]);
    headingLabel.setLatLng(end);
}


function ensureAccuracyCircle(center, accuracy){
  const a = Math.max(1, accuracy || 1);

  // 정확도 5m 이하면 숨김
  if (a <= 3) {
    if (accuracyCircle) {
      map.removeLayer(accuracyCircle);
      accuracyCircle = null;
    }
    return;
  }

  let color = "#00C853";
  if (a > 7) color = "#FF3B30";
  else color = "#FFD400";

  if (!accuracyCircle) {
    accuracyCircle = L.circle(center, {
      radius: a,
      color: color,
      fillColor: color,
      fillOpacity: 0.12,
      weight: 2,
      interactive: false
    }).addTo(map);
  } else {
    accuracyCircle.setLatLng(center);
    accuracyCircle.setRadius(a);
    accuracyCircle.setStyle({
      color: color,
      fillColor: color
    });
  }
}


/* =========================================================
   헤딩 / 회전
========================================================= */
function mapBearingForHeading() {
    return normalizeDeg(360 - finalHeading);
}

function applyHeadingBearingIfNeeded() {
  if (!headingUp || isUserInteracting()) return;
  if (typeof map.setBearing !== "function") return;

  const now = Date.now();
  if (now - lastBearingUpdateAt < BEARING_UPDATE_MS) return;

  const target = mapBearingForHeading();
  const diff = Math.abs(angleDiff(lastBearingApplied, target));

  if (diff < BEARING_MIN_DIFF) return;

  lastBearingUpdateAt = now;
  lastBearingApplied = target;

  map.setBearing(target);
}

function chooseHeading(speed) {
  if (compassHeading !== null && !isNaN(compassHeading)) {
    finalHeading = smoothAngle(finalHeading, compassHeading, COMPASS_SMOOTH);
    return "나침반";
  }

  if (gpsHeading !== null && !isNaN(gpsHeading)) {
    finalHeading = smoothAngle(finalHeading, gpsHeading, GPS_HEAD_SMOOTH);
    return "GPS";
  }

  return "대기";
}

/* =========================================================
   전체 업데이트
========================================================= */

function updateAll(pos, accuracy, speed, source) {
  if (!pos) return;

  updateBoat(pos);
  updateRangeRings(pos);
  updateHeadingLine(pos);
  ensureAccuracyCircle(pos, accuracy);
  applyHeadingBearingIfNeeded();

  if (followBoat && !isUserInteracting()) {
    const now = Date.now();
    if (now - lastCenterUpdateAt > 350) {
      lastCenterUpdateAt = now;
      programmatic(() => {
        map.panTo(pos, { animate: true, duration: 0.25 });
      }, 300);
    }
  }

/* =========================================================
   나침반
========================================================= */
window.enableCompass = async function() {
  try {
    if (
      typeof DeviceOrientationEvent !== "undefined" &&
      typeof DeviceOrientationEvent.requestPermission === "function"
    ) {
      const result = await DeviceOrientationEvent.requestPermission();
      if (result !== "granted") {
        alert("나침반 권한이 거부되었습니다.");
        return;
      }
    }

    window.addEventListener("deviceorientationabsolute", onOrientation, true);
    window.addEventListener("deviceorientation", onOrientation, true);

    compassEnabled = true;
    updateButtons();
  } catch (e) {
    alert("나침반 권한 요청 실패: " + e.message);
  }
};

function onOrientation(e) {
  let h = null;

  if (e.webkitCompassHeading !== undefined && e.webkitCompassHeading !== null) {
    h = e.webkitCompassHeading;
  } else if (e.alpha !== null && e.alpha !== undefined) {
    h = 360 - e.alpha;
  }

  if (h === null || isNaN(h)) return;

  compassHeading = smoothAngle(compassHeading, normalizeDeg(h), COMPASS_SMOOTH);
  const source = chooseHeading(0);

  // 나침반 이벤트에서는 위치/거리링은 건드리지 않고,
  // 보트 아이콘 회전과 지도 헤딩만 즉시 갱신한다.
  updateBoatRotationOnly();
  applyHeadingBearingIfNeeded();
 
/* =========================================================
   GPS
========================================================= */
function startGPS() {
  if (!navigator.geolocation) {
    info.innerHTML = "GPS를 지원하지 않는 브라우저입니다.";
    return;
  }

  navigator.geolocation.watchPosition(
    pos => {
      gpsStatus.innerHTML = "📡";
      gpsStatus.style.color = "#00ff00";
      const now = Date.now();
      if (now - lastGpsAt < 700) return;
      lastGpsAt = now;

      const lat = pos.coords.latitude;
      const lng = pos.coords.longitude;
      const accuracy = pos.coords.accuracy;
      const speed = pos.coords.speed;
      const heading = pos.coords.heading;

      if (accuracy && accuracy > MAX_GPS_ACCURACY_DROP) {
        updateInfo(accuracy, speed, "정확도낮음");
        return;
      }

      const raw = L.latLng(lat, lng);
      currentLatLng = raw;

      if (heading !== null && heading !== undefined && !isNaN(heading)) {
        gpsHeading = normalizeDeg(heading);
      }

      if (smoothedLatLng && smoothedLatLng.distanceTo(raw) < MIN_MOVE_METERS) {
        const source = chooseHeading(speed);
        updateAll(smoothedLatLng, accuracy, speed, source);
        return;
      }

      const factor = accuracy && accuracy > WEAK_GPS_ACCURACY
        ? POS_SMOOTH_WEAK
        : POS_SMOOTH_GOOD;

      smoothedLatLng = smoothLatLng(smoothedLatLng, raw, factor);

      const source = chooseHeading(speed);
      updateAll(smoothedLatLng, accuracy, speed, source);
    },
   err => {

      gpsStatus.innerHTML = "📡❌";
      gpsStatus.style.color = "#ff3b30";

    }
    {
      enableHighAccuracy: true,
      maximumAge: 0,
      timeout: 20000
    }
  );
}

function addPinHere() {

  pinMode = true;

  alert("지도에서 원하는 위치를 터치하세요.");

}

function loadPins() {

  pinLayer.clearLayers();

  const pins = JSON.parse(localStorage.getItem("gosamPins") || "[]");

  pins.forEach((p, index) => {

    const marker = L.marker([p.lat, p.lng]).addTo(pinLayer);

    marker.bindPopup(`
      <b>${p.name}</b><br><br>
      <button onclick="deletePin(${index})">
        🗑️ 삭제
      </button>
    `);

  });

}
  window.deletePin = function(index) {

  const pins = JSON.parse(localStorage.getItem("gosamPins") || "[]");

  if (!confirm("핀을 삭제하시겠습니까?")) return;

  pins.splice(index, 1);

  localStorage.setItem(
    "gosamPins",
    JSON.stringify(pins)
  );

  loadPins();
};
/* =========================================================
   버튼
========================================================= */
window.goToMe = function() {
  if (!navigator.geolocation) {
    alert("위치 서비스를 지원하지 않습니다.");
    return;
  }

  navigator.geolocation.getCurrentPosition(
    pos => {
      const now = L.latLng(pos.coords.latitude, pos.coords.longitude);

      currentLatLng = now;
      smoothedLatLng = now;
      followBoat = true;

      if (pos.coords.heading !== null && pos.coords.heading !== undefined && !isNaN(pos.coords.heading)) {
        gpsHeading = normalizeDeg(pos.coords.heading);
      }

      const source = chooseHeading(pos.coords.speed);

      programmatic(() => {
        map.setView(now, Math.max(map.getZoom(), 19), { animate: true });
      }, 500);

      updateAll(now, pos.coords.accuracy, pos.coords.speed, source);
      updateButtons();
    },
    () => alert("현재 위치를 가져오지 못했습니다. 위치 권한을 확인하세요."),
    {
      enableHighAccuracy: true,
      timeout: 12000,
      maximumAge: 0
    }
  );
};

window.toggleHeadingUp = function() {
  headingUp = !headingUp;

  if (!headingUp) {
    if (typeof map.setBearing === "function") {
      map.setBearing(0);
      lastBearingApplied = 0;
    }
  } else {
    if (!compassEnabled) {
      alert("제자리 회전까지 정확히 보려면 먼저 ‘나침반’을 누르세요.");
    }
    applyHeadingBearingIfNeeded();
  }

  updateBoatRotationOnly();
  if (smoothedLatLng) updateAll(smoothedLatLng, null, 0, chooseHeading(0));
  updateButtons();
};

window.toggleFollow = function() {
  followBoat = !followBoat;

  if (followBoat && smoothedLatLng) {
    programmatic(() => {
      map.setView(smoothedLatLng, Math.max(map.getZoom(), 17), { animate: true });
    }, 400);
  }

  updateButtons();
};
